<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa Projetado</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:20px;}
.container { max-width:1200px; margin:auto;}
h1 { text-align:center;}

.resumo {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.card {
    background:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.box-valor {
    border:2px solid black;
    padding:5px;
    margin-top:5px;
}

.negativo { color:red; font-weight:bold;}

.mes { background:white; padding:10px; margin-top:10px; border-radius:8px;}

table { width:100%; border-collapse:collapse;}
td,th { border:1px solid #ddd; padding:5px; text-align:center;}

.detalhe { margin-top:20px; background:white; padding:15px; border-radius:8px;}
</style>
</head>

<body>

<div class="container">
<h1>Fluxo de Caixa Projetado</h1>

Ano:
<select id="anoSelect" onchange="atualizarAno()"></select>

<div id="resumoTrimestres" class="resumo"></div>
<div id="meses"></div>
<div id="detalheDia" class="detalhe"></div>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1992496280&output=csv";

let dados=[],dadosFiltrados=[];
let saldoInicial=0;
let dataSaldoInicial=null;
let saldoPorData={};
let anoSelecionado=null;

// ===== HELPERS =====
function parseCSV(t){
 let l=[],r=[],v='',q=false;
 for(let c of t){
  if(c=='"')q=!q;
  else if(c==','&&!q){r.push(v);v=''}
  else if((c=='\n'||c=='\r')&&!q){
   if(v||r.length){r.push(v);l.push(r);r=[];v=''}
  } else v+=c;
 }
 if(v||r.length){r.push(v);l.push(r)}
 return l;
}

function br(v){
 return Number((v||'0').replace(/\./g,'').replace(',','.'));
}

function formatar(v){
 return v.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function converterData(v){
 if(!v) return null;
 let p=v.split('/');
 return new Date(p[2],p[1]-1,p[0]);
}

function keyData(d){
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

// ===== IMPORTAÇÃO =====
fetch(url).then(r=>r.text()).then(txt=>{

 let linhas=parseCSV(txt);

 dados = linhas.slice(1).map(l=>{

  let ref=(l[4]||'').toUpperCase();

  let tipo=null;
  if(ref.includes('RECEBER')) tipo='entrada';
  if(ref.includes('PAGAR')) tipo='saida';

  return {
    data: converterData(l[3]),
    valor: br(l[2]),
    descricao: l[10]||'',
    tipo
  };

 }).filter(d=>d.data && d.tipo);

 saldoInicial = br(linhas[1][6]);
 dataSaldoInicial = converterData(linhas[1][7]);

 carregarAnos();
});

// ===== ANOS =====
function carregarAnos(){
 let anos=[...new Set(dados.map(d=>d.data.getFullYear()))].sort();
 let s=document.getElementById('anoSelect');
 s.innerHTML='<option value="">Selecione</option>';
 anos.forEach(a=> s.innerHTML+=`<option value="${a}">${a}</option>`);
}

// ===== ATUALIZA =====
function atualizarAno(){

 anoSelecionado=Number(document.getElementById('anoSelect').value);

 dadosFiltrados=dados.filter(d=>d.data.getFullYear()==anoSelecionado);

 calcularSaldosAno();
 gerarResumoTrimestres();

 document.getElementById('meses').innerHTML='';
 document.getElementById('detalheDia').innerHTML='';
}

// ===== MOTOR CORRIGIDO =====
function calcularSaldosAno(){

 saldoPorData={};

 let mapa={};

 dadosFiltrados.forEach(d=>{
  let k=keyData(d);

  if(!mapa[k]) mapa[k]={entrada:0,saida:0};

  if(d.tipo==='entrada') mapa[k].entrada+=d.valor;
  else mapa[k].saida+=d.valor;
 });

 // 🔥 DATA INICIAL EM STRING (SEM FUSO)
 let inicioStr = keyData(dataSaldoInicial);

 if(!mapa[inicioStr]){
   mapa[inicioStr]={entrada:0,saida:0};
 }

 let datas = Object.keys(mapa).sort();

 let saldoAtual = saldoInicial;

 datas.forEach(k=>{

   if(k === inicioStr){

     saldoPorData[k]={
       saldoInicial: saldoInicial,
       entrada: mapa[k].entrada,
       saida: mapa[k].saida,
       saldoFinal: saldoInicial + mapa[k].entrada - mapa[k].saida
     };

     saldoAtual = saldoPorData[k].saldoFinal;
   }

   else if(k > inicioStr){

     let entrada = mapa[k].entrada;
     let saida = mapa[k].saida;

     let final = saldoAtual + entrada - saida;

     saldoPorData[k]={
       saldoInicial: saldoAtual,
       entrada,
       saida,
       saldoFinal: final
     };

     saldoAtual = final;
   }

 });
}

// ===== TRIMESTRES =====
const tri={1:[0,1,2],2:[3,4,5],3:[6,7,8],4:[9,10,11]};

function gerarResumoTrimestres(){

 let c=document.getElementById('resumoTrimestres');
 c.innerHTML='';

 for(let t=1;t<=4;t++){

  let e=0,s=0;

  dadosFiltrados.forEach(d=>{
    if(tri[t].includes(d.data.getMonth())){
      if(d.tipo==='entrada') e+=d.valor;
      else s+=d.valor;
    }
  });

  let saldo=e-s;

  c.innerHTML+=`
  <div class="card" onclick="selecionarTrimestre(${t})">
    <h4>${t}º Trimestre</h4>
    <div class="box-valor">Entrada: ${formatar(e)}</div>
    <div class="box-valor">Saída: -${formatar(s)}</div>
    <div class="box-valor ${saldo<0?'negativo':''}">
        Saldo: ${formatar(saldo)}
    </div>
  </div>`;
 }
}

// ===== TRIMESTRE =====
function selecionarTrimestre(t){

 let container=document.getElementById('meses');
 container.innerHTML='';
 document.getElementById('detalheDia').innerHTML='';

 if(anoSelecionado < dataSaldoInicial.getFullYear()) return;
 if(anoSelecionado === dataSaldoInicial.getFullYear() && t === 1) return;

 tri[t].forEach(m=>{

  let dias={};

  Object.keys(saldoPorData).forEach(k=>{
    let d=new Date(k);

    if(d.getMonth()===m){
      dias[d.getDate()]=saldoPorData[k];
    }
  });

  let diasOrd=Object.keys(dias).map(Number).sort((a,b)=>a-b);

  if(diasOrd.length===0) return;

  let tabela='<table><tr><th>Dia</th>';

  diasOrd.forEach(d=>{
    tabela+=`<th onclick="mostrarDetalhe(${m},${d})" style="cursor:pointer">${d}</th>`;
  });

  tabela+='</tr>';

  let si='<tr><td>Saldo Inicial</td>';
  let en='<tr><td>Entradas</td>';
  let sa='<tr><td>Saídas</td>';
  let sf='<tr><td>Saldo Final</td>';

  diasOrd.forEach(d=>{
    let obj=dias[d];

    si+=`<td>${formatar(obj.saldoInicial)}</td>`;
    en+=`<td>${formatar(obj.entrada)}</td>`;
    sa+=`<td>-${formatar(obj.saida)}</td>`;
    sf+=`<td class="${obj.saldoFinal<0?'negativo':''}">${formatar(obj.saldoFinal)}</td>`;
  });

  tabela+=si+'</tr>'+en+'</tr>'+sa+'</tr>'+sf+'</tr></table>';

  let nomeMes=new Date(anoSelecionado,m).toLocaleString('pt-BR',{month:'long'});

  container.innerHTML+=`
  <div class="mes">
    <h3>${nomeMes}</h3>
    ${tabela}
  </div>`;
 });
}

// ===== DETALHE =====
function mostrarDetalhe(mes,dia){

 let entradas=[],saidas=[],totE=0,totS=0;

 dadosFiltrados.forEach(d=>{
  if(d.data.getMonth()===mes && d.data.getDate()==dia){
    if(d.tipo==='entrada'){ entradas.push(d); totE+=d.valor;}
    else{ saidas.push(d); totS+=d.valor;}
  }
 });

 let saldo=totE-totS;

 document.getElementById('detalheDia').innerHTML=`
 <h3>Detalhes do dia</h3>

 <b>Entradas</b>
 <table>
 ${entradas.map(e=>`<tr><td>${e.descricao}</td><td>${formatar(e.valor)}</td></tr>`).join('')}
 </table>

 <b>Saídas</b>
 <table>
 ${saidas.map(s=>`<tr><td>${s.descricao}</td><td>-${formatar(s.valor)}</td></tr>`).join('')}
 </table>

 <h3 class="${saldo<0?'negativo':''}">
 Saldo: ${formatar(saldo)}
 </h3>`;
}

</script>

</body>
</html>
