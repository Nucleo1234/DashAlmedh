<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa Projetado</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:20px;}
.container { max-width:1200px; margin:auto;}
h1 { text-align:center;}

.resumo {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.card {
    background:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.mes {
    background:white;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.box-valor {
    border:2px solid black;
    padding:5px 10px;
    margin-top:5px;
}

.negativo { color:red; font-weight:bold;}

table { width:100%; border-collapse:collapse;}
td,th { border:1px solid #ddd; padding:5px; text-align:center;}

.detalhe {
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:8px;
}

.flex-detalhe {
    display: flex;
    gap: 20px;
    margin-top: 15px;
}

.coluna {
    width: 50%;
}

.titulo-coluna {
    font-weight: bold;
    margin-bottom: 5px;
}

.total {
    margin-top: 5px;
    font-weight: bold;
}

.saldo-final {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}





</style>
</head>

<body>

<div class="container">

<h1>Fluxo de Caixa Projetado</h1>

Ano:
<select id="anoSelect" onchange="atualizarAno()"></select>

<div id="resumoTrimestres" class="resumo"></div>
<div id="meses"></div>
<div id="detalheDia" class="detalhe"></div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1992496280&output=csv";

let dados=[],dadosFiltrados=[];
let saldoInicial=0;
let dataSaldoInicial=null;
let saldoPorData={};
let anoSelecionado=null;

// ===== FORMATADOR DATA
function formatarDataKey(date){
 let y = date.getFullYear();
 let m = String(date.getMonth()+1).padStart(2,'0');
 let d = String(date.getDate()).padStart(2,'0');
 return `${y}-${m}-${d}`;
}

// ===== CONVERSOR DATA (ANTI BUG)
function converterData(v){
 if(!v) return null;
 let p = v.split('/');
 return new Date(
   Number(p[2]),
   Number(p[1]) - 1,
   Number(p[0]),
   12,0,0 // 🔥 evita bug de fuso
 );
}

// ===== CSV
function parseCSV(t){
 let l=[],r=[],v='',q=false;
 for(let c of t){
  if(c=='"')q=!q;
  else if(c==','&&!q){r.push(v);v=''}
  else if((c=='\n'||c=='\r')&&!q){
   if(v||r.length){r.push(v);l.push(r);r=[];v=''}
  } else v+=c;
 }
 if(v||r.length){r.push(v);l.push(r)}
 return l;
}

function br(v){
 return Number((v||'0').replace(/\./g,'').replace(',','.'));
}

function formatar(v){
 return v.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

// ===== IMPORTAÇÃO
fetch(url).then(r=>r.text()).then(txt=>{

 let linhas=parseCSV(txt);

 dados = linhas.slice(1).map(l=>{

  let ref = (l[4]||'').toUpperCase();

  let tipo=null;
  if(ref.includes('RECEBER')) tipo='entrada';
  if(ref.includes('PAGAR')) tipo='saida';

  return {
    data: converterData(l[3]),
    valor: br(l[2]),
    descricao: l[1] || '',
    tipo
  };

 }).filter(d=>d.data && d.tipo);

 saldoInicial = br(linhas[1][6]);
 dataSaldoInicial = converterData(linhas[1][7]);

 carregarAnos();
});

// ===== ANOS
function carregarAnos(){
 let anos=[...new Set(dados.map(d=>d.data.getFullYear()))].sort();
 let s=document.getElementById('anoSelect');
 s.innerHTML='<option value="">Selecione</option>';
 anos.forEach(a=> s.innerHTML+=`<option value="${a}">${a}</option>`);
}

// ===== ATUALIZA
function atualizarAno(){
 anoSelecionado=Number(document.getElementById('anoSelect').value);

 dadosFiltrados=dados.filter(d=>d.data.getFullYear()==anoSelecionado);

 calcularFluxo();
 gerarCards();

 document.getElementById('meses').innerHTML='';
 document.getElementById('detalheDia').innerHTML='';
}

// ===== MOTOR CORRIGIDO
function calcularFluxo(){

 let mapa={};

 // 🔹 agrupa valores por data
 dadosFiltrados.forEach(d=>{
  let k = formatarDataKey(d.data);

  if(!mapa[k]) mapa[k]={entrada:0,saida:0};

  if(d.tipo==='entrada') mapa[k].entrada+=d.valor;
  else mapa[k].saida+=d.valor;
 });

 let keyInicial = formatarDataKey(dataSaldoInicial);

 // 🔥 garante existência do dia inicial
 if(!mapa[keyInicial]){
   mapa[keyInicial] = {entrada:0, saida:0};
 }

 // 🔹 pega apenas datas >= data base
 let datasValidas = Object.keys(mapa)
   .filter(k => k >= keyInicial)
   .sort();

 let saldoAtual = saldoInicial;
 saldoPorData = {};

 datasValidas.forEach((k)=>{

   let entrada = mapa[k]?.entrada || 0;
   let saida = mapa[k]?.saida || 0;

   let saldoInicialDia = saldoAtual;
   let saldoFinal = saldoInicialDia + entrada - saida;

   saldoPorData[k] = {
     saldoInicial: saldoInicialDia,
     entrada,
     saida,
     saldoFinal
   };

   saldoAtual = saldoFinal;
 });
}

// ===== CARDS
const tri={1:[0,1,2],2:[3,4,5],3:[6,7,8],4:[9,10,11]};

function gerarCards(){

 let c=document.getElementById('resumoTrimestres');
 c.innerHTML='';

 for(let t=1;t<=4;t++){

  let e=0,s=0;

  dadosFiltrados.forEach(d=>{
    if(tri[t].includes(d.data.getMonth())){
      if(d.tipo==='entrada') e+=d.valor;
      else s+=d.valor;
    }
  });

  let saldo=e-s;

  c.innerHTML+=`
  <div class="card" onclick="abrirTrimestre(${t})">
    <h4>${t}º Trimestre</h4>
    <div class="box-valor">Entrada: ${formatar(e)}</div>
    <div class="box-valor">Saída: -${formatar(s)}</div>
    <div class="box-valor ${saldo<0?'negativo':''}">
      Saldo: ${formatar(saldo)}
    </div>
  </div>`;
 }
}

// ===== TRIMESTRE
function abrirTrimestre(t){

 document.getElementById('meses').innerHTML='';
 document.getElementById('detalheDia').innerHTML='';

 let anoBase = dataSaldoInicial.getFullYear();
 let mesBase = dataSaldoInicial.getMonth();

 if(anoSelecionado < anoBase) return;
 if(anoSelecionado === anoBase && t === 1) return;

 tri[t].forEach(m=>{

  let dias={};

  Object.keys(saldoPorData).forEach(k=>{

    let [ano,mes,dia] = k.split('-');
    let d = new Date(ano, mes-1, dia, 12);

    if(d.getMonth()===m){
      dias[d.getDate()]=saldoPorData[k];
    }
  });

  let diasOrd=Object.keys(dias).map(Number).sort((a,b)=>a-b);

  if(diasOrd.length===0) return;

  let tabela='<table><tr><th>Dia</th>';

  diasOrd.forEach(d=>{
    tabela+=`<th onclick="mostrarDetalhe(${m},${d})" style="cursor:pointer">${d}</th>`;
  });

  tabela+='</tr>';

  let si='<tr><td>Saldo Inicial</td>';
  let en='<tr><td>Entradas</td>';
  let sa='<tr><td>Saídas</td>';
  let sf='<tr><td>Saldo Final</td>';

  diasOrd.forEach(d=>{
    let obj=dias[d];

    si+=`<td>${formatar(obj.saldoInicial)}</td>`;
    en+=`<td>${formatar(obj.entrada)}</td>`;
    sa+=`<td>-${formatar(obj.saida)}</td>`;
    sf+=`<td class="${obj.saldoFinal<0?'negativo':''}">${formatar(obj.saldoFinal)}</td>`;
  });

  tabela+=si+'</tr>'+en+'</tr>'+sa+'</tr>'+sf+'</tr></table>';

  let nomeMes=new Date(anoSelecionado,m).toLocaleString('pt-BR',{month:'long'});

  document.getElementById('meses').innerHTML+=`
  <div class="mes">
    <h3>${nomeMes}</h3>
    ${tabela}
  </div>`;
 });
}

// ===== DETALHE
function mostrarDetalhe(mes,dia){

 let entradas=[],saidas=[],totE=0,totS=0;

 dadosFiltrados.forEach(d=>{
  if(d.data.getMonth()===mes && d.data.getDate()==dia){
    if(d.tipo==='entrada'){ entradas.push(d); totE+=d.valor;}
    else{ saidas.push(d); totS+=d.valor;}
  }
 });

 let saldo=totE-totS;

 let nomeMes=new Date(anoSelecionado,mes)
   .toLocaleString('pt-BR',{month:'long'});

 document.getElementById('detalheDia').innerHTML=`

 <h3>Detalhes do dia escolhido</h3>
 <p><b>Ano:</b> ${anoSelecionado}</p>
 <p><b>Mês:</b> ${nomeMes}</p>
 <p><b>Dia:</b> ${String(dia).padStart(2,'0')}</p>

 <div class="flex-detalhe">

   <div class="coluna">
     <div class="titulo-coluna">Entrada</div>

     <table>
       <tr><th>Descrição</th><th>Valor</th></tr>
       ${entradas.map(e=>`
         <tr>
           <td>${e.descricao}</td>
           <td>${formatar(e.valor)}</td>
         </tr>`).join('')}
     </table>

     <div class="total">Total Entrada: ${formatar(totE)}</div>
   </div>

   <div class="coluna">
     <div class="titulo-coluna">Saída</div>

     <table>
       <tr><th>Descrição</th><th>Valor</th></tr>
       ${saidas.map(s=>`
         <tr>
           <td>${s.descricao}</td>
           <td>-${formatar(s.valor)}</td>
         </tr>`).join('')}
     </table>

     <div class="total">Total Saída: -${formatar(totS)}</div>
   </div>

 </div>

 <div class="saldo-final ${saldo<0?'negativo':''}">
   Saldo do dia: ${formatar(saldo)}
 </div>
 `;
}
</script>

</body>
</html>
