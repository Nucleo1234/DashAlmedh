<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxo de Caixa Projetado</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:20px;}
.container { max-width:1200px; margin:auto;}
h1 { text-align:center;}

.resumo {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.card {
    background:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.negativo { color:red; font-weight:bold;}

.mes { background:white; padding:10px; margin-top:10px; border-radius:8px;}

table { width:100%; border-collapse:collapse;}
td,th { border:1px solid #ddd; padding:5px; text-align:center;}

.flex { display:flex; gap:20px;}
.box { width:50%; }

</style>
</head>

<body>

<div class="container">

<h1>Fluxo de Caixa Projetado</h1>

Ano:
<select id="anoSelect" onchange="atualizarAno()"></select>

<div id="resumoTrimestres" class="resumo"></div>
<div id="meses"></div>
<div id="detalheDia"></div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1992496280&single=true&output=csv";

let dados=[], dadosFiltrados=[];
let saldoInicial=0;
let dataSaldoInicial=null;
let anoSelecionado=null;
let saldoPorData={};

const mesesTri={1:[0,1,2],2:[3,4,5],3:[6,7,8],4:[9,10,11]};

function parseCSV(t){
 const l=[];let r=[],v='',q=false;
 for(let c of t){
  if(c=='"')q=!q;
  else if(c==','&&!q){r.push(v);v=''}
  else if((c=='\n'||c=='\r')&&!q){
   if(v||r.length){r.push(v);l.push(r);r=[];v=''}
  } else v+=c;
 }
 if(v||r.length){r.push(v);l.push(r)}
 return l;
}

function br(v){
 return parseFloat((v||'0').replace(/\./g,'').replace(',','.'))||0;
}

function formatar(v){
 return v.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function converterData(v){
 let p=v.split('/');
 return new Date(p[2],p[1]-1,p[0]);
}

fetch(url).then(r=>r.text()).then(txt=>{

 const linhas=parseCSV(txt);

 linhas.slice(1).forEach(l=>{

  let data=converterData(l[3]); // Coluna D
  let valor=br(l[2]);           // Coluna C
  let ref=(l[4]||'').toLowerCase();

  let tipo = ref.includes('receber') ? 'entrada' : 'saida';

  dados.push({
   data,
   valor,
   tipo,
   descricao:l[10]
  });

 });

 // SALDO INICIAL
 saldoInicial = br(linhas[1][6]); // G
 dataSaldoInicial = converterData(linhas[1][7]); // H

 carregarAnos();

});

function carregarAnos(){
 let anos=[...new Set(dados.map(d=>d.data.getFullYear()))].sort();
 let s=document.getElementById('anoSelect');
 s.innerHTML='<option>Selecione</option>';
 anos.forEach(a=> s.innerHTML+=`<option>${a}</option>`);
}

function atualizarAno(){

 anoSelecionado=Number(document.getElementById('anoSelect').value);

 dadosFiltrados=dados.filter(d=>d.data.getFullYear()==anoSelecionado);

 calcularSaldosAno();
 gerarResumo();

 document.getElementById('meses').innerHTML='';
 document.getElementById('detalheDia').innerHTML='';
}

function calcularSaldosAno(){

 saldoPorData={};

 let mapa={};

 dadosFiltrados.forEach(d=>{
  let k=d.data.toISOString().slice(0,10);
  if(!mapa[k]) mapa[k]={entrada:0,saida:0};
  d.tipo==='entrada'?mapa[k].entrada+=d.valor:mapa[k].saida+=d.valor;
 });

 let datas=Object.keys(mapa).sort();

 let saldo=null;

 datas.forEach(k=>{

  let d=new Date(k);

  if(d.getTime()===dataSaldoInicial.getTime()){
   saldo=saldoInicial;
  }

  if(saldo!==null){

   let e=mapa[k].entrada;
   let s=mapa[k].saida;

   let final=saldo+e-s;

   saldoPorData[k]={saldoInicial:saldo,entrada:e,saida:s,saldoFinal:final};

   saldo=final;
  }
 });
}

function gerarResumo(){

 let c=document.getElementById('resumoTrimestres');
 c.innerHTML='';

 for(let t=1;t<=4;t++){

  let e=0,s=0;

  dadosFiltrados.forEach(d=>{
   if(mesesTri[t].includes(d.data.getMonth())){
    d.tipo==='entrada'?e+=d.valor:s+=d.valor;
   }
  });

  let saldo=e-s;

  c.innerHTML+=`
  <div class="card" onclick="selecionarTrimestre(${t})">
   <h4>${t}º Trimestre</h4>
   <div>Entrada: ${formatar(e)}</div>
   <div>Saída: ${formatar(s)}</div>
   <div class="${saldo<0?'negativo':''}">Saldo: ${formatar(saldo)}</div>
  </div>`;
 }
}

function selecionarTrimestre(t){

 let container=document.getElementById('meses');
 container.innerHTML='';
 document.getElementById('detalheDia').innerHTML='';

 let mesSaldo = dataSaldoInicial.getMonth();
 let triSaldo = Object.keys(mesesTri).find(k=>mesesTri[k].includes(mesSaldo));

 // 🔥 REGRA PRINCIPAL
 if(anoSelecionado == dataSaldoInicial.getFullYear() && t < triSaldo){
  return; // não mostra nada
 }

 mesesTri[t].forEach(m=>{

  let dias={};

  Object.keys(saldoPorData).forEach(k=>{
   let d=new Date(k);

   if(d.getMonth()===m){

    // 🔥 CORTE NA DATA DO SALDO
    if(
      anoSelecionado == dataSaldoInicial.getFullYear() &&
      m == mesSaldo &&
      d < dataSaldoInicial
    ){
      return;
    }

    dias[d.getDate()]=saldoPorData[k];
   }
  });

  let ord=Object.keys(dias).map(Number).sort((a,b)=>a-b);

  if(!ord.length) return;

  let html='<table><tr><td>Dia</td>';
  ord.forEach(d=> html+=`<td>${d}</td>`);
  html+='</tr>';

  let si='<tr><td>Saldo Inicial</td>';
  let en='<tr><td>Entradas</td>';
  let sa='<tr><td>Saídas</td>';
  let sf='<tr><td>Saldo Final</td>';

  ord.forEach(d=>{
   let o=dias[d];

   si+=`<td>${formatar(o.saldoInicial)}</td>`;
   en+=`<td>${formatar(o.entrada)}</td>`;
   sa+=`<td>-${formatar(o.saida)}</td>`;
   sf+=`<td class="${o.saldoFinal<0?'negativo':''}">${formatar(o.saldoFinal)}</td>`;
  });

  html+=si+'</tr>'+en+'</tr>'+sa+'</tr>'+sf+'</tr></table>';

  let nomeMes=new Date(anoSelecionado,m).toLocaleString('pt-BR',{month:'long'});

  container.innerHTML+=`
  <div class="mes">
   <h3>${nomeMes}</h3>
   ${html}
  </div>`;
 });
}

</script>

</body>
</html>
