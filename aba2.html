<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#eef1f5; }

header {
    padding:15px;
    background:#1f2d3d;
    color:#fff;
}

.header-cards {
    display:flex;
    gap:15px;
    margin-top:10px;
}

.card-header {
    background:#273849;
    padding:10px;
    border-radius:8px;
    text-align:center;
    flex:1;
}

.container { padding:20px; }

.section { margin-bottom:25px; }

.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
}

table {
    width:100%;
    border-collapse: collapse;
}

th, td {
    padding:6px;
    font-size:12px;
    border:1px solid #ccc;
}

th {
    background:#34495e;
    color:#fff;
}

td { text-align:right; }
th:first-child, td:first-child { text-align:left; }

.flex { display:flex; gap:20px; }

.small-chart { height:250px !important; }
</style>
</head>

<body>

<header>
<h2>Dashboard Financeiro</h2>

<div class="header-cards">
<div class="card-header"><div>Total Entradas</div><div id="totalEntradas">R$ 0</div></div>
<div class="card-header"><div>Total Saídas</div><div id="totalSaidas">R$ 0</div></div>
<div class="card-header"><div>Saldo</div><div id="saldoTotal">R$ 0</div></div>
</div>
</header>

<div class="container">

<div class="section card">
<canvas id="saldoChart" class="small-chart"></canvas>
</div>

<div class="section flex">
<div class="card" style="width:50%"><h3>2025</h3><table id="table2025"></table></div>
<div class="card" style="width:50%"><h3>2026</h3><table id="table2026"></table></div>
</div>

<div class="section flex">
<div class="card" style="width:50%">
<h3 id="mensalTitulo">Visão Mensal</h3>
<table id="mensalTable"></table>
</div>

<div class="card" style="width:50%">
<h3 id="diarioTitulo">Detalhes</h3>
<table id="diarioTable"></table>
</div>
</div>

<div class="section card">
<h3>Resumo por Conta de Custo</h3>
<table id="custosTable"></table>
</div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=720565093&output=csv";

let rawData=[];
let chart;

const meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ===== CSV =====
function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"') q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

// ===== PARSE =====
function parseDate(v){
    if(!v) return null;
    let p=v.split("/");
    return new Date(p[2],p[1]-1,p[0]);
}

function br(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

// ===== NORMALIZA =====
function normalize(linhas){
    return linhas.slice(1).map(l=>({
        data: parseDate(l[0]),
        credito: br(l[3]),
        debito: br(l[4]),
        descricao: l[10] || "Sem descrição"
    })).filter(r=>r.data);
}

// ===== KPI =====
function calcularTotais(){
    let e=0,s=0;
    rawData.forEach(r=>{e+=r.credito; s+=r.debito;});
    document.getElementById('totalEntradas').innerText=e.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById('totalSaidas').innerText=s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById('saldoTotal').innerText=(e-s).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

// ===== ANO =====
function processYear(y){
    let arr=Array(12).fill().map(()=>({e:0,s:0,saldo:0}));

    rawData.forEach(r=>{
        if(r.data.getFullYear()==y){
            let m=r.data.getMonth();
            arr[m].e+=r.credito;
            arr[m].s+=r.debito;
        }
    });

    arr.forEach(r=>r.saldo=r.e-r.s);
    return arr;
}

function buildYear(y,id){
    let d=processYear(y);

    let html='<tr><th>Mês</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>';

    d.forEach((r,i)=>{
        html+=`<tr>
        <td>${meses[i]}</td>
        <td>${r.e.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        <td>${r.s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        <td><a onclick="loadMonth(${y},${i})">${r.saldo.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</a></td>
        </tr>`;
    });

    document.getElementById(id).innerHTML=html;
}

// ===== MÊS =====
function loadMonth(y,m){

    document.getElementById('mensalTitulo').innerText = `Visão Mensal - ${meses[m]}/${y}`;

    let dados=rawData.filter(r=>r.data.getFullYear()==y&&r.data.getMonth()==m);

    let totalE=0,totalS=0;
    let dias={};

    dados.forEach(r=>{
        let d=r.data.getDate();
        if(!dias[d]) dias[d]={e:0,s:0};
        dias[d].e+=r.credito;
        dias[d].s+=r.debito;
    });

    let html='<tr><th>Dia</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>';

    Object.keys(dias).sort((a,b)=>a-b).forEach(d=>{
        let r=dias[d];
        totalE+=r.e;
        totalS+=r.s;

        html+=`<tr onclick="loadDay(${y},${m},${d})" style="cursor:pointer">
        <td>${d}</td>
        <td>${r.e.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        <td>${r.s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        <td>${(r.e-r.s).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        </tr>`;
    });

    html+=`<tr style="background:#eee;font-weight:bold">
    <td>Total</td>
    <td>${totalE.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
    <td>${totalS.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
    <td>${(totalE-totalS).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
    </tr>`;

    document.getElementById('mensalTable').innerHTML=html;
}

// ===== DIA =====
function loadDay(y,m,d){

    document.getElementById('diarioTitulo').innerText = `Detalhes - ${d}/${m+1}/${y}`;

    let dados=rawData.filter(r=>
        r.data.getFullYear()==y &&
        r.data.getMonth()==m &&
        r.data.getDate()==d
    );

    let html='<tr><th>Descrição</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>';

    dados.forEach(r=>{
        let entrada=r.credito||0;
        let saida=r.debito||0;

        html+=`<tr>
        <td>${r.descricao}</td>
        <td>${entrada.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        <td>${saida.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        <td>${(entrada-saida).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
        </tr>`;
    });

    document.getElementById('diarioTable').innerHTML=html;
}

// ===== CUSTOS =====
function buildCustos(){

    let mapa={};
    let mesesUsados=new Set();

    rawData.forEach(r=>{
        let key=r.descricao;
        let mes=r.data.getMonth();
        let ano=r.data.getFullYear();
        let id=ano+"-"+mes;

        mesesUsados.add(id);

        if(!mapa[key]) mapa[key]={};
        if(!mapa[key][id]) mapa[key][id]=0;

        mapa[key][id]+= (r.credito-r.debito);
    });

    let mesesOrdenados=[...mesesUsados].sort();

    let header='<tr><th>Conta</th>';
    mesesOrdenados.forEach(m=>{
        let [y,mo]=m.split("-");
        header+=`<th>${meses[mo]}/${y}</th>`;
    });
    header+='<th>Total</th></tr>';

    let rows='';
    let totaisMeses={};
    let totalGeral=0;

    let contasOrdenadas=Object.keys(mapa).sort((a,b)=>a.localeCompare(b,'pt-BR'));

    contasOrdenadas.forEach(conta=>{
        let total=0;
        rows+=`<tr><td>${conta}</td>`;

        mesesOrdenados.forEach(m=>{
            let v=mapa[conta][m]||0;
            total+=v;

            if(!totaisMeses[m]) totaisMeses[m]=0;
            totaisMeses[m]+=v;

            rows+=`<td>${v? v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):''}</td>`;
        });

        totalGeral+=total;

        rows+=`<td><b>${total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</b></td></tr>`;
    });

    // TOTAL FINAL
    rows+=`<tr style="background:#eee;font-weight:bold"><td>Total</td>`;
    mesesOrdenados.forEach(m=>{
        rows+=`<td>${(totaisMeses[m]||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>`;
    });
    rows+=`<td>${totalGeral.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td></tr>`;

    document.getElementById('custosTable').innerHTML=header+rows;
}

// ===== LOAD =====
fetch(url)
.then(r=>r.text())
.then(data=>{
    const linhas=parseCSV(data);
    rawData=normalize(linhas);

    calcularTotais();
    buildYear(2025,'table2025');
    buildYear(2026,'table2026');
    buildCustos();
});

</script>

</body>
</html>
