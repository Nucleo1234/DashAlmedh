<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#eef1f5; }

header { padding:15px; background:#1f2d3d; color:#fff; }

.header-cards {
 display:flex;
 gap:15px;
 margin-top:10px;
}

.card-header {
 background:#273849;
 padding:10px;
 border-radius:8px;
 text-align:center;
 flex:1;
}

.container { padding:20px; }

.card {
 background:#fff;
 padding:15px;
 border-radius:10px;
 margin-bottom:20px;
}

table { width:100%; border-collapse: collapse; }

th, td {
 padding:6px;
 font-size:12px;
 border:1px solid #ccc;
}

th { background:#34495e; color:#fff; }

td { text-align:right; }

td:first-child, th:first-child { text-align:left; }

.flex { display:flex; gap:20px; }

.small-chart { height:250px !important; }
</style>
</head>

<body>

<header>

<h2>Dashboard Financeiro</h2>

<div class="header-cards">
<div class="card-header"><div>Total Entradas</div><div id="totalEntradas">R$ 0</div></div>
<div class="card-header"><div>Total Saídas</div><div id="totalSaidas">R$ 0</div></div>
<div class="card-header"><div>Saldo</div><div id="saldoTotal">R$ 0</div></div>
</div>

</header>

<div class="container">

<div class="card">
<canvas id="saldoChart" class="small-chart"></canvas>
</div>

<div class="flex">
<div class="card" style="width:50%">
<h3>2025</h3>
<table id="table2025"></table>
</div>

<div class="card" style="width:50%">
<h3>2026</h3>
<table id="table2026"></table>
</div>
</div>

<div class="flex">
<div class="card" style="width:50%">
<h3 id="mensalTitulo">Visão Mensal</h3>
<table id="mensalTable"></table>
</div>

<div class="card" style="width:50%">
<h3 id="diarioTitulo">Detalhes</h3>
<table id="diarioTable"></table>
</div>
</div>

<div class="card">
<h3>Resumo por Conta de Custo</h3>
<div style="overflow:auto">
<table id="custosTable"></table>
</div>
</div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=720565093&output=csv";

let rawData=[];
let chart;
const meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ===== CSV =====
function parseCSV(t){
 let l=[],r=[],v='',q=false;
 for(let c of t){
  if(c=='"') q=!q;
  else if(c==','&&!q){r.push(v);v=''}
  else if((c=='\n'||c=='\r')&&!q){
   if(v||r.length){r.push(v);l.push(r);r=[];v=''}
  } else v+=c;
 }
 if(v||r.length){r.push(v);l.push(r)}
 return l;
}

function br(v){
 return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function parseDate(v){
 if(!v) return null;
 let p=v.split("/");
 return new Date(p[2],p[1]-1,p[0]);
}

// ===== NORMALIZA =====
function normalize(linhas){
 return linhas.slice(1).map(l=>({
  data: parseDate(l[0]),
  credito: br(l[3]),
  debito: br(l[4]),
  descricao: l[10] || "Sem descrição"
 })).filter(r=>r.data);
}

// ===== KPI =====
function calcularTotais(){
 let e=0,s=0;
 rawData.forEach(r=>{e+=r.credito; s+=r.debito;});

 document.getElementById('totalEntradas').innerText=e.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
 document.getElementById('totalSaidas').innerText=s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
 document.getElementById('saldoTotal').innerText=(e-s).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

// ===== GRÁFICO =====
function buildChart(){
 let saldo=0, labels=[], data=[];

 rawData.sort((a,b)=>a.data-b.data).forEach(r=>{
  saldo+=r.credito-r.debito;
  labels.push(r.data.toLocaleDateString());
  data.push(saldo);
 });

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById('saldoChart'),{
  type:'line',
  data:{labels,datasets:[{label:'Saldo acumulado',data}]},
  options:{maintainAspectRatio:false}
 });
}

// ===== ANO =====
function buildYear(y,id){
 let arr=Array(12).fill().map(()=>({e:0,s:0}));

 rawData.forEach(r=>{
  if(r.data.getFullYear()==y){
   let m=r.data.getMonth();
   arr[m].e+=r.credito;
   arr[m].s+=r.debito;
  }
 });

 let html='<tr><th>Mês</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>';

 arr.forEach((r,i)=>{
  if(r.e!==0 || r.s!==0){
   let saldo=r.e-r.s;
   html+=`<tr>
   <td>${meses[i]}</td>
   <td>${r.e.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
   <td>${r.s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
   <td><a onclick="loadMonth(${y},${i})">${saldo.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</a></td>
   </tr>`;
  }
 });

 document.getElementById(id).innerHTML=html;
}

// ===== MÊS =====
function loadMonth(y,m){

 document.getElementById('diarioTable').innerHTML='';
 document.getElementById('diarioTitulo').innerText="Detalhes";

 document.getElementById('mensalTitulo').innerText=`Visão Mensal - ${meses[m]}/${y}`;

 let dados=rawData.filter(r=>r.data.getFullYear()==y&&r.data.getMonth()==m);

 let dias={},totalE=0,totalS=0;

 dados.forEach(r=>{
  let d=r.data.getDate();
  if(!dias[d]) dias[d]={e:0,s:0};
  dias[d].e+=r.credito;
  dias[d].s+=r.debito;
 });

 let html='<tr><th>Dia</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>';

 Object.keys(dias).forEach(d=>{
  let r=dias[d];
  let saldo=r.e-r.s;

  totalE+=r.e;
  totalS+=r.s;

  html+=`<tr>
  <td>${d}</td>
  <td>${r.e.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
  <td>${r.s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
  <td><a onclick="loadDay(${y},${m},${d})">${saldo.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</a></td>
  </tr>`;
 });

 html+=`<tr style="font-weight:bold;background:#eee">
 <td>Total</td>
 <td>${totalE.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
 <td>${totalS.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
 <td>${(totalE-totalS).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
 </tr>`;

 document.getElementById('mensalTable').innerHTML=html;
}

// ===== DIA =====
function loadDay(y,m,d){
 let dados=rawData.filter(r=>r.data.getFullYear()==y&&r.data.getMonth()==m&&r.data.getDate()==d);

 let html='<tr><th>Descrição</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>';

 dados.forEach(r=>{
  html+=`<tr>
  <td>${r.descricao}</td>
  <td>${r.credito.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
  <td>${r.debito.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
  <td>${(r.credito-r.debito).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
  </tr>`;
 });

 document.getElementById('diarioTable').innerHTML=html;
}

// ===== RESUMO =====
function buildCustos(){

 let mapa={};
 let mesesSet=new Set();

 rawData.forEach(r=>{
  let key=r.descricao;

  let mesAno=`${r.data.getMonth()}-${r.data.getFullYear()}`;
  mesesSet.add(mesAno);

  if(!mapa[key]) mapa[key]={};

  if(!mapa[key][mesAno]) mapa[key][mesAno]=0;

  mapa[key][mesAno]+=r.credito-r.debito;
 });

 let mesesOrdenados=[...mesesSet].sort((a,b)=>{
  let [m1,y1]=a.split('-');
  let [m2,y2]=b.split('-');
  return new Date(y1,m1)-new Date(y2,m2);
 });

 let contas=Object.keys(mapa).sort();

 let header='<tr><th>Conta</th>';

 mesesOrdenados.forEach(m=>{
  let [mes,ano]=m.split('-');
  header+=`<th>${meses[mes]}/${ano}</th>`;
 });

 header+='<th>Total</th></tr>';

 let totaisCol=Array(mesesOrdenados.length).fill(0);
 let totalGeral=0;

 let rows='';

 contas.forEach(c=>{
  let totalLinha=0;
  rows+=`<tr><td>${c}</td>`;

  mesesOrdenados.forEach((m,i)=>{
   let v=mapa[c][m]||0;
   totalLinha+=v;
   totaisCol[i]+=v;

   rows+=`<td>${v? v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):''}</td>`;
  });

  totalGeral+=totalLinha;

  rows+=`<td><b>${totalLinha.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</b></td></tr>`;
 });

 rows+=`<tr style="font-weight:bold;background:#eee">
 <td>Total</td>`;

 totaisCol.forEach(v=>{
  rows+=`<td>${v? v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):''}</td>`;
 });

 rows+=`<td>${totalGeral.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td></tr>`;

 document.getElementById('custosTable').innerHTML=header+rows;
}

// ===== INIT =====
fetch(url)
.then(r=>r.text())
.then(data=>{
 let linhas=parseCSV(data);
 rawData=normalize(linhas);

 calcularTotais();
 buildChart();
 buildYear(2025,'table2025');
 buildYear(2026,'table2026');
 buildCustos(); // 🔥 voltou
});

</script>

</body>
</html>
