<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#cfe8ff; padding:20px; }

.topo { font-size:13px; font-weight:bold; }

.titulo {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:30px;
}

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card h3 { font-size:12px; margin:0; }
.card p { font-size:16px; font-weight:bold; }

.grafico-container {
    width:90%;
    height:500px;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

.donut-container {
    width:90%;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:30px;
    align-items:flex-start;
}

.donut-chart {
    width:250px !important;
    height:250px !important;
}

.legenda {
    color:white;
    font-size:12px;
    margin-top:20px;
}

.legenda-item {
    display:flex;
    align-items:center;
    margin-bottom:8px;
}

.cor-box {
    width:12px;
    height:12px;
    margin-right:8px;
}

/* ===== TABELA ===== */
#tabelaMatriz {
    color:white;
    width:100%;
    overflow:auto;
}

#tabela50 {
    border-collapse:collapse;
    font-size:11px;
    width:100%;
}

#tabela50 th, #tabela50 td {
    padding:6px 8px;
    border:1px solid rgba(255,255,255,0.3);
}

#tabela50 th {
    background:rgba(255,255,255,0.1);
}

#tabelaReceber {
    border-collapse: collapse;
    font-size: 11px;
    width: 100%;
}

#tabelaReceber th, #tabelaReceber td {
    padding: 6px 8px;
    border: 1px solid rgba(255,255,255,0.3);
}

#tabelaReceber th {
    background: rgba(255,255,255,0.1);
}

#tabelaABC {
    border-collapse: collapse;
    font-size: 11px;
    width: 100%;
}

#tabelaABC th, #tabelaABC td {
    padding: 6px 8px;
    border: 1px solid rgba(255,255,255,0.3);
}

#tabelaABC th {
    background: rgba(255,255,255,0.1);
    cursor: pointer;
}

</style>
</head>

<body>

<div class="topo">
Data de Atualização: <span id="dataAtualizacao">...</span>
</div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total de Cirurgias</h3><p id="totalCirurgias">...</p></div>
<div class="card"><h3>Receita Bruta R$</h3><p id="receita">...</p></div>
<div class="card"><h3>Custo R$</h3><p id="custo">...</p></div>
<div class="card"><h3>Resultado Bruto R$</h3><p id="resultado">...</p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<div class="donut-container">

    <div>
        <canvas id="graficoDonut" class="donut-chart"></canvas>
        <div id="legendaCustom" class="legenda"></div>
    </div>

    <div id="tabelaMatriz">
        <h3>Cirurgias - Faturar</h3>
        <table id="tabela50"></table>
    </div>

</div>

<!-- ===== NOVO BLOCO: VALORES A RECEBER ===== -->
<div class="donut-container">

    <div>
        <canvas id="graficoDonutReceber" class="donut-chart"></canvas>
        <div id="legendaReceber" class="legenda"></div>
    </div>

    <div style="color:white; width:100%;">
        <h3>Valores a Receber</h3>
        <table id="tabelaReceber" class="tabela-padrao"></table>
    </div>

</div>

<!-- ===== BLOCO CURVA ABC ===== -->
<div class="donut-container">

    <div style="width:100%; color:white;">
        <h3>Curva ABC Cirurgia</h3>

        <table id="tabelaABC"></table>

    </div>

</div>

<script>

/* ===== SEU SCRIPT ORIGINAL (INALTERADO) ===== */
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";

function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function mesAno(d){
    if(!d||!d.includes("/"))return "";
    let p=d.split("/");
    return p[1]+"/"+p[2].slice(-2);
}

fetch(url).then(r=>r.text()).then(data=>{
const linhas=parseCSV(data);

document.getElementById("dataAtualizacao").innerText = linhas[1][0];

const vales = linhas.slice(1).map(l => l[2]).filter(v => v);
document.getElementById("totalCirurgias").innerText = [...new Set(vales)].length;

let map={},recT=0,cusT=0;
let mapPizza={};
let matriz50 = {};
let mesesSet = new Set();

linhas.slice(1).forEach(l=>{
    let vale=l[2];
    let situacao=l[4];
    let mes=mesAno(l[5]);
    let rec=br(l[27]);
    let cus=br(l[29]);

    recT+=rec;
    cusT+=cus;

    if(mes){
        if(!map[mes]) map[mes]={rec:0,cus:0};
        map[mes].rec+=rec;
        map[mes].cus+=cus;
    }

    if(!mapPizza[situacao]){
        mapPizza[situacao]={qtd:0,valor:0,vales:{}};
    }

    if(!mapPizza[situacao].vales[vale]){
        mapPizza[situacao].qtd++;
        mapPizza[situacao].vales[vale]=true;
    }

    mapPizza[situacao].valor+=rec;

    let cliente = l[8];
    let mes50 = mesAno(l[5]);
    let valor50 = br(l[27]);

    if(situacao && situacao.includes("50") && cliente && mes50){
        mesesSet.add(mes50);
        if(!matriz50[cliente]) matriz50[cliente] = {};
        if(!matriz50[cliente][mes50]) matriz50[cliente][mes50] = 0;
        matriz50[cliente][mes50] += valor50;
    }
});

const f=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

document.getElementById("receita").innerText=f(recT);
document.getElementById("custo").innerText=f(cusT);
document.getElementById("resultado").innerText=f(recT-cusT);

/* ===== GRÁFICO MENSAL ===== */
const meses=Object.keys(map).sort((a,b)=>{
let [m1,y1]=a.split('/');
let [m2,y2]=b.split('/');
return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
});

const recArr=meses.map(m=>map[m].rec);
const cusArr=meses.map(m=>map[m].cus);
const lucroArr=meses.map(m=>map[m].rec-map[m].cus);
const percArr=meses.map(m=>{
let l=map[m].rec-map[m].cus;
return map[m].cus ? (l/map[m].cus)*100 : 0;
});

new Chart(document.getElementById("graficoMensal"),{
type:'bar',
data:{labels:meses,datasets:[
{data:cusArr,backgroundColor:'#ff7b7b'},
{data:recArr,backgroundColor:'#4CAF50'}
]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}},
plugins:[{
afterDatasetsDraw(chart){
const {ctx}=chart;
chart.data.datasets.forEach((dataset,i)=>{
chart.getDatasetMeta(i).data.forEach((bar,index)=>{
ctx.fillStyle='white';
ctx.font='10px Arial';
ctx.textAlign='center';
ctx.fillText(f(dataset.data[index]), bar.x, bar.y-5);
});
});
}},
{
afterDraw(chart){
const {ctx,chartArea:{left,right},scales:{x,y}}=chart;
const max=Math.max(...recArr,...cusArr);
const yPos=y.getPixelForValue(max*1.15);

ctx.strokeStyle='white';
ctx.beginPath();
ctx.moveTo(left,yPos);
ctx.lineTo(right,yPos);
ctx.stroke();

meses.forEach((m,i)=>{
const xPos=x.getPixelForValue(i);
ctx.beginPath();
ctx.arc(xPos,yPos,5,0,Math.PI*2);
ctx.fillStyle='yellow';
ctx.fill();

ctx.fillStyle='white';
ctx.font='10px Arial';
ctx.fillText(percArr[i].toFixed(0)+'%', xPos, yPos+15);
ctx.fillText(f(lucroArr[i]), xPos, yPos+28);
});
}}
]
});

/* ===== DONUT ORIGINAL ===== */
function cor(label){
if(label.includes("70")) return "#4CAF50";
if(label.includes("50")) return "#FFD966";
if(label.includes("40")) return "#ff7b7b";
return "#999";
}

const labels=Object.keys(mapPizza);
const dados=labels.map(l=>mapPizza[l].qtd);
const total=dados.reduce((a,b)=>a+b,0);

new Chart(document.getElementById("graficoDonut"),{
type:'doughnut',
data:{labels:labels,datasets:[{data:dados,backgroundColor:labels.map(l=>cor(l))}]},
options:{plugins:{legend:{display:false}}},
plugins:[{
afterDraw(chart){
const {ctx}=chart;
chart.data.datasets[0].data.forEach((v,i)=>{
let meta=chart.getDatasetMeta(0).data[i];
let p=((v/total)*100).toFixed(0);
ctx.fillStyle='black';
ctx.fillText(p+'%', meta.x, meta.y);
});
}}
]
});

/* ===== LEGENDA ORIGINAL ===== */
const legendaDiv=document.getElementById("legendaCustom");
labels.forEach(l=>{
let div=document.createElement("div");
div.className="legenda-item";
div.innerHTML=`<div class="cor-box" style="background:${cor(l)}"></div>
<div>${l} | Qtd ${mapPizza[l].qtd} | ${f(mapPizza[l].valor)}</div>`;
legendaDiv.appendChild(div);
});

/* ===== TABELA ORIGINAL ===== */
const tabela = document.getElementById("tabela50");

const mesesTabela = Array.from(mesesSet).sort((a,b)=>{
let [m1,y1]=a.split('/');
let [m2,y2]=b.split('/');
return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
});

let html = "<tr><th>Cliente</th>";
mesesTabela.forEach(m=> html += `<th>${m}</th>`);
html += "<th>Total</th></tr>";

let totalGeral = 0;
let totaisMes = {};
mesesTabela.forEach(m => totaisMes[m]=0);

Object.entries(matriz50).forEach(([cliente,dados])=>{
let linha = `<tr><td>${cliente}</td>`;
let totalCliente = 0;

mesesTabela.forEach(m=>{
let v=dados[m]||0;
totalCliente+=v;
totaisMes[m]+=v;
linha+=`<td style="text-align:right;">${v?f(v):""}</td>`;
});

totalGeral+=totalCliente;
linha+=`<td style="text-align:right;font-weight:bold;">${f(totalCliente)}</td></tr>`;
html+=linha;
});

let totalLinha = `<tr style="font-weight:bold;"><td>Total</td>`;
mesesTabela.forEach(m=>{
totalLinha+=`<td style="text-align:right;">${f(totaisMes[m])}</td>`;
});
totalLinha+=`<td style="text-align:right;">${f(totalGeral)}</td></tr>`;
html+=totalLinha;

tabela.innerHTML = html;

});

/* ===== NOVO SCRIPT (ISOLADO) ===== */
(function(){

const urlReceber = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1261021270&single=true&output=csv";

function parseCSV_R(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br_R(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function mesAno_R(d){
    if(!d||!d.includes("/"))return "";
    let p=d.split("/");
    return `${p[1]}/${p[2]}`;
}

function ordemMes_R(m){
    let [mes,ano]=m.split('/');
    return new Date(ano, mes-1);
}

function f_R(v){
    return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

fetch(urlReceber)
.then(r=>r.text())
.then(data=>{

const linhas=parseCSV_R(data);

let clientes={},matriz={},mesesSet=new Set();

linhas.slice(1).forEach(l=>{
    let cliente=l[1];
    let venc=l[7];
    let valor=br_R(l[19]);
    let mes=mesAno_R(venc);

    if(!cliente) return;

    if(!clientes[cliente]) clientes[cliente]={qtd:0,valor:0};
    clientes[cliente].qtd++;
    clientes[cliente].valor+=valor;

    if(mes){
        mesesSet.add(mes);
        if(!matriz[cliente]) matriz[cliente]={};
        if(!matriz[cliente][mes]) matriz[cliente][mes]=0;
        matriz[cliente][mes]+=valor;
    }
});

const meses = Array.from(mesesSet).sort((a,b)=>ordemMes_R(a)-ordemMes_R(b));

const labels=Object.keys(clientes);
const dados=labels.map(l=>clientes[l].qtd);
const cores=labels.map((_,i)=>`hsl(${i*40},70%,60%)`);

new Chart(document.getElementById("graficoDonutReceber"),{
type:'doughnut',
data:{labels:labels,datasets:[{data:dados,backgroundColor:cores}]},
options:{plugins:{legend:{display:false}}}
});

const legenda=document.getElementById("legendaReceber");

labels.forEach((l,i)=>{
let div=document.createElement("div");
div.className="legenda-item";
div.innerHTML=`<div class="cor-box" style="background:${cores[i]}"></div>
<div>${l} | Qtd: ${clientes[l].qtd} | ${f_R(clientes[l].valor)}</div>`;
legenda.appendChild(div);
});

let html="<tr><th>Cliente</th>";
meses.forEach(m=> html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

let totalGeral=0;
let totaisMes={};
meses.forEach(m=> totaisMes[m]=0);

Object.entries(matriz).forEach(([cliente,dados])=>{
let totalCliente=0;
let linha=`<tr><td>${cliente}</td>`;

meses.forEach(m=>{
let v=dados[m]||0;
totalCliente+=v;
totaisMes[m]+=v;
linha+=`<td style="text-align:right;">${v?f_R(v):""}</td>`;
});

totalGeral+=totalCliente;
linha+=`<td style="text-align:right;font-weight:bold;">${f_R(totalCliente)}</td></tr>`;
html+=linha;
});

let totalLinha=`<tr style="font-weight:bold;"><td>Total</td>`;
meses.forEach(m=>{
totalLinha+=`<td style="text-align:right;">${f_R(totaisMes[m])}</td>`;
});
totalLinha+=`<td style="text-align:right;">${f_R(totalGeral)}</td></tr>`;
html+=totalLinha;

document.getElementById("tabelaReceber").innerHTML=html;

});

})();
</script>

<script>
(function(){

const urlABC = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";

function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function f(v){
    return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

let dados = [];
let ordem = {};

fetch(urlABC)
.then(r=>r.text())
.then(data=>{

const linhas = parseCSV(data);
let mapa = {};

linhas.slice(1).forEach(l=>{

    let grupo = l[14];
    let tipo = l[15];
    let vale = l[2];

    let valor = br(l[27]);
    let custo = br(l[29]);

    if(!tipo) return;

    let chave = grupo + "|" + tipo;

    if(!mapa[chave]){
        mapa[chave] = {
            grupo, tipo,
            vales:new Set(),
            valor:0,
            custo:0
        };
    }

    mapa[chave].vales.add(vale);
    mapa[chave].valor += valor;
    mapa[chave].custo += custo;

});

// ===== ARRAY FINAL =====
dados = Object.values(mapa).map(item=>{

    let qtd = item.vales.size;
    let resultado = item.valor - item.custo;

    let mediaValor = qtd ? item.valor/qtd : 0;
    let mediaCusto = qtd ? item.custo/qtd : 0;

    return {
        grupo:item.grupo,
        tipo:item.tipo,
        qtd,
        valor:item.valor,
        custo:item.custo,
        resultado,
        mediaValor,
        mediaCusto,
        diferencaMedia: mediaValor - mediaCusto   // 🔥 NOVO CAMPO
    };

});

// ordenação inicial
dados.sort((a,b)=> b.resultado - a.resultado);

renderTabela();

});

// ===== RENDER =====
function renderTabela(){

let html = `
<tr>
<th onclick="ordenar('grupo')">Grupo</th>
<th onclick="ordenar('tipo')">Tipo</th>
<th onclick="ordenar('qtd')">Qtde</th>
<th onclick="ordenar('valor')">Valor Total</th>
<th onclick="ordenar('custo')">Custo Total</th>
<th onclick="ordenar('resultado')">Resultado</th>
<th onclick="ordenar('mediaValor')">Média Valor</th>
<th onclick="ordenar('mediaCusto')">Média Custo</th>
<th onclick="ordenar('diferencaMedia')"># Média Valor - Média Custo</th>
</tr>
`;

let totalQtd=0, totalValor=0, totalCusto=0;

dados.forEach(d=>{

totalQtd += d.qtd;
totalValor += d.valor;
totalCusto += d.custo;

html += `
<tr>
<td>${d.grupo}</td>
<td>${d.tipo}</td>
<td style="text-align:center;">${d.qtd}</td>
<td style="text-align:right;">${f(d.valor)}</td>
<td style="text-align:right;">${f(d.custo)}</td>
<td style="text-align:right;">${f(d.resultado)}</td>
<td style="text-align:right;">${f(d.mediaValor)}</td>
<td style="text-align:right;">${f(d.mediaCusto)}</td>
<td style="text-align:right;">${f(d.diferencaMedia)}</td>
</tr>
`;

});

// ===== TOTAL =====
html += `
<tr style="font-weight:bold;">
<td colspan="2">TOTAL</td>
<td style="text-align:center;">${totalQtd}</td>
<td style="text-align:right;">${f(totalValor)}</td>
<td style="text-align:right;">${f(totalCusto)}</td>
<td style="text-align:right;">${f(totalValor-totalCusto)}</td>
<td></td>
<td></td>
<td></td>
</tr>
`;

document.getElementById("tabelaABC").innerHTML = html;

}

// ===== ORDENAÇÃO =====
window.ordenar = function(campo){

ordem[campo] = !ordem[campo];

dados.sort((a,b)=>{

if(typeof a[campo] === "string"){
    return ordem[campo] 
        ? a[campo].localeCompare(b[campo])
        : b[campo].localeCompare(a[campo]);
}

return ordem[campo]
    ? a[campo] - b[campo]
    : b[campo] - a[campo];

});

renderTabela();

};

})();
</script>


</body>
</html>
