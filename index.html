<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>

/* ===== CSS ABAS ===== */
* { margin:0; padding:0; box-sizing:border-box; }

body { font-family: Arial; background:#f4f7fb; }

.header {
    background:#184a5a;
    color:white;
    padding:15px 25px;
    font-size:20px;
    font-weight:bold;
}

.tabs {
    display:flex;
    background:white;
    border-bottom:2px solid #ddd;
}

.tab-button {
    padding:14px 20px;
    cursor:pointer;
    border:none;
    background:none;
    font-weight:bold;
    color:#555;
}

.tab-button.active {
    color:#184a5a;
    border-bottom:3px solid #184a5a;
}

.tab-content { display:none; padding:20px; }
.tab-content.active { display:block; }

.aba-box {
    background:white;
    border-radius:10px;
    padding:20px;
}

/* ===== CSS DASHBOARD ===== */

.topo { font-size:13px; font-weight:bold; }

.titulo {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:30px;
}

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card h3 { font-size:12px; }
.card p { font-size:16px; font-weight:bold; }

.grafico-container {
    width:90%;
    height:500px;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

.donut-container {
    width:90%;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:30px;
}

.donut-chart {
    width:250px !important;
    height:250px !important;
}

.legenda { color:white; font-size:12px; }

table {
    border-collapse:collapse;
    font-size:11px;
    width:100%;
    color:white;
}

th, td {
    padding:6px 8px;
    border:1px solid rgba(255,255,255,0.3);
}

th {
    background:rgba(255,255,255,0.1);
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
Dashboard Financeiro e Operacional
</div>

<!-- ABAS -->
<div class="tabs">
    <button class="tab-button active" onclick="openTab(event,'aba1')">Performance e Indicadores</button>
    <button class="tab-button" onclick="openTab(event,'aba2')">Conciliação Bancária</button>
    <button class="tab-button" onclick="openTab(event,'aba3')">Fluxo de Caixa</button>
    <button class="tab-button" onclick="openTab(event,'aba4')">Projetado vs Realizado</button>
</div>

<!-- ABA 1 -->
<div id="aba1" class="tab-content active">
<div class="aba-box">

<div class="topo">
Data de Atualização: <span id="dataAtualizacao">...</span>
</div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total de Cirurgias</h3><p id="totalCirurgias"></p></div>
<div class="card"><h3>Receita</h3><p id="receita"></p></div>
<div class="card"><h3>Custo</h3><p id="custo"></p></div>
<div class="card"><h3>Resultado</h3><p id="resultado"></p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<div class="donut-container">
<div>
<canvas id="graficoDonut" class="donut-chart"></canvas>
<div id="legendaCustom" class="legenda"></div>
</div>
<div style="width:100%;">
<h3 style="color:white;">Cirurgias - Faturar</h3>
<table id="tabela50"></table>
</div>
</div>

<div class="donut-container">
<div>
<canvas id="graficoDonutReceber" class="donut-chart"></canvas>
<div id="legendaReceber" class="legenda"></div>
</div>
<div style="width:100%;">
<h3 style="color:white;">Valores a Receber</h3>
<table id="tabelaReceber"></table>
</div>
</div>

<div class="donut-container">
<div style="width:100%;">
<h3 style="color:white;">Curva ABC</h3>
<table id="tabelaABC"></table>
</div>
</div>

</div>
</div>

<!-- OUTRAS ABAS -->
<div id="aba2" class="tab-content"><div class="aba-box">Em construção</div></div>
<div id="aba3" class="tab-content"><div class="aba-box">Em construção</div></div>
<div id="aba4" class="tab-content"><div class="aba-box">Em construção</div></div>

<script>

/* ===== CONTROLE ABAS ===== */
function openTab(evt, tabName){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-button").forEach(b=>b.classList.remove("active"));
document.getElementById(tabName).classList.add("active");
evt.currentTarget.classList.add("active");
}

</script>
