<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#cfe8ff; padding:20px;}

.topo {font-size:13px;font-weight:bold;}
.titulo {text-align:center;font-size:22px;font-weight:bold;margin-top:30px;}

.container-cards {
    display:flex; justify-content:center; gap:15px; margin-top:30px;
}

.card {
    width:150px; background:white; padding:10px;
    border-radius:10px; text-align:center;
}

.card h3 {font-size:12px;margin:0;}
.card p {font-size:16px;font-weight:bold;}

.grafico-container {
    width:80%; height:400px; margin-top:40px;
    background:#0f3b4c; padding:20px; border-radius:10px;
}

.pizza-container {
    width:60%; margin-top:40px;
}
</style>
</head>

<body>

<div class="topo">
Data de Atualização: <span id="dataAtualizacao"></span>
</div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total</h3><p id="totalCirurgias"></p></div>
<div class="card"><h3>Receita</h3><p id="receita"></p></div>
<div class="card"><h3>Custo</h3><p id="custo"></p></div>
<div class="card"><h3>Resultado</h3><p id="resultado"></p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<div class="pizza-container">
<canvas id="graficoPizza"></canvas>
</div>

<script>

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";

function parseCSV(t){
const l=[];let r=[],v='',q=false;
for(let c of t){
if(c=='"')q=!q;
else if(c==','&&!q){r.push(v);v=''}
else if((c=='\n'||c=='\r')&&!q){if(v||r.length){r.push(v);l.push(r);r=[];v=''}}
else v+=c;}
if(v||r.length){r.push(v);l.push(r)}
return l;
}

function br(v){
return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function mesAno(d){
if(!d||!d.includes("/"))return "";
let p=d.split("/");
return p[1]+"/"+p[2].slice(-2);
}

fetch(url).then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

document.getElementById("dataAtualizacao").innerText=linhas[1][0];

const valesUnicos=[...new Set(linhas.slice(1).map(l=>l[2]).filter(v=>v))];
document.getElementById("totalCirurgias").innerText=valesUnicos.length;

let mapMes={},recT=0,cusT=0;
let mapPizza={};
let controleVale={};

// LOOP
linhas.slice(1).forEach(l=>{

let vale=l[2];
let situacao=l[27]; // ⚠️ AJUSTAR SE NECESSÁRIO
let dataCir=l[5];

let rec=br(l[27]); // ❌ errado proposital para evitar erro
rec=br(l[27]);

rec=br(l[27]); // placeholder

// ✔ RECEITA AGORA COLUNA AB = 27
rec=br(l[27]);

let custo=br(l[29]);

// ===== MENSAL =====
let mes=mesAno(dataCir);
if(mes){
if(!mapMes[mes]) mapMes[mes]={rec:0,cus:0};
mapMes[mes].rec+=rec;
mapMes[mes].cus+=custo;
}

recT+=rec;
cusT+=custo;

// ===== PIZZA =====
if(!mapPizza[situacao]){
mapPizza[situacao]={qtd:0,valor:0,vales:{}};
}

// contar vale único
if(!mapPizza[situacao].vales[vale]){
mapPizza[situacao].qtd++;
mapPizza[situacao].vales[vale]=true;
}

// somar valor total (SEM RESTRIÇÃO)
mapPizza[situacao].valor+=rec;

});

document.getElementById("receita").innerText=recT.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
document.getElementById("custo").innerText=cusT.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
document.getElementById("resultado").innerText=(recT-cusT).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

// ===== GRAFICO PIZZA =====
const labels=Object.keys(mapPizza);
const valores=labels.map(l=>mapPizza[l].qtd);

new Chart(document.getElementById("graficoPizza"),{
type:'pie',
data:{
labels:labels,
datasets:[{
data:valores,
backgroundColor:[
'#4CAF50','#FF6384','#36A2EB','#FFCE56','#8e44ad','#e67e22'
]
}]
},
options:{
plugins:{
tooltip:{
callbacks:{
label:(ctx)=>{
let nome=ctx.label;
let qtd=mapPizza[nome].qtd;
let valor=mapPizza[nome].valor;

return nome+" | Qtd: "+qtd+" | "+
valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}
}
}
}
}
});

});

</script>

</body>
</html>
