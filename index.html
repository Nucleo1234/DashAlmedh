<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#cfe8ff; padding:20px; }

.topo { font-size:13px; font-weight:bold; }

.titulo { text-align:center; font-size:22px; font-weight:bold; margin-top:30px; }

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.grafico-container {
    width:90%;
    height:500px;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

.donut-container {
    width:90%;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:30px;
}

.donut-chart { width:250px; }

.legenda { color:white; font-size:12px; margin-top:20px; }

table {
    border-collapse:collapse;
    width:100%;
    font-size:11px;
    color:white;
}

th, td {
    border:1px solid rgba(255,255,255,0.3);
    padding:6px;
}

h3 { color:white; }

</style>
</head>

<body>

<div class="topo">Data: <span id="dataAtualizacao"></span></div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total Cirurgias</h3><p id="totalCirurgias"></p></div>
<div class="card"><h3>Receita</h3><p id="receita"></p></div>
<div class="card"><h3>Custo</h3><p id="custo"></p></div>
<div class="card"><h3>Resultado</h3><p id="resultado"></p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<!-- CIRURGIAS -->
<div class="donut-container">
<div>
<canvas id="graficoDonut" class="donut-chart"></canvas>
<div id="legendaCustom" class="legenda"></div>
</div>

<div>
<h3>Cirurgias - Faturar</h3>
<table id="tabela50"></table>
</div>
</div>

<!-- PETROLEO -->
<div class="donut-container">
<div>
<canvas id="graficoDonutPetroleo" class="donut-chart"></canvas>
<div id="legendaPetroleo" class="legenda"></div>
</div>

<div>
<h3>Valores a Receber</h3>
<table id="tabelaPetroleo"></table>
</div>
</div>

<script>

/* ===== FUNÇÕES ===== */
function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br(v){ return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0; }
function f(v){ return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function mesAno(d){ if(!d)return ""; let p=d.split("/"); return p[1]+"/"+p[2].slice(-2); }

/* ================= PRINCIPAL ================= */

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv")
.then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

document.getElementById("dataAtualizacao").innerText = linhas[1][0];

const vales = linhas.slice(1).map(l => l[2]).filter(v => v);
document.getElementById("totalCirurgias").innerText = [...new Set(vales)].length;

let map={},recT=0,cusT=0,mapPizza={},matriz50={},mesesSet=new Set();

linhas.slice(1).forEach(l=>{

let vale=l[2],situ=l[4],mes=mesAno(l[5]);
let rec=br(l[27]),cus=br(l[29]);

recT+=rec; cusT+=cus;

if(mes){
if(!map[mes]) map[mes]={rec:0,cus:0};
map[mes].rec+=rec; map[mes].cus+=cus;
}

if(!mapPizza[situ]) mapPizza[situ]={qtd:0,valor:0,vales:{}};
if(!mapPizza[situ].vales[vale]){
mapPizza[situ].qtd++;
mapPizza[situ].vales[vale]=true;
}
mapPizza[situ].valor+=rec;

/* MATRIZ 50 */
let cliente=l[8];
if(situ?.includes("50") && cliente && mes){
mesesSet.add(mes);
if(!matriz50[cliente]) matriz50[cliente]={};
matriz50[cliente][mes]=(matriz50[cliente][mes]||0)+rec;
}

});

/* CARDS */
document.getElementById("receita").innerText=f(recT);
document.getElementById("custo").innerText=f(cusT);
document.getElementById("resultado").innerText=f(recT-cusT);

/* ORDENAR MESES */
const meses=Object.keys(map).sort((a,b)=>{
let [m1,y1]=a.split('/'),[m2,y2]=b.split('/');
return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
});

/* GRÁFICO COMPLETO ORIGINAL */
const recArr=meses.map(m=>map[m].rec);
const cusArr=meses.map(m=>map[m].cus);
const lucroArr=meses.map(m=>map[m].rec-map[m].cus);
const percArr=meses.map(m=>map[m].cus ? ((map[m].rec-map[m].cus)/map[m].cus)*100 : 0);

new Chart(graficoMensal,{
type:'bar',
data:{labels:meses,datasets:[
{data:cusArr,backgroundColor:'#ff7b7b'},
{data:recArr,backgroundColor:'#4CAF50'}
]},
options:{
plugins:{legend:{display:false}},
scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}
},
plugins:[
{
id:'labels',
afterDatasetsDraw(c){
const ctx=c.ctx;
c.data.datasets.forEach((d,i)=>{
c.getDatasetMeta(i).data.forEach((bar,j)=>{
ctx.fillStyle='white';
ctx.fillText(f(d.data[j]),bar.x,bar.y-5);
});
});
}
},
{
id:'linhaTopo',
afterDraw(chart){
const {ctx,chartArea:{left,right},scales:{x,y}}=chart;
const max=Math.max(...recArr,...cusArr);
const yPos=y.getPixelForValue(max*1.15);

ctx.strokeStyle='white';
ctx.beginPath();
ctx.moveTo(left,yPos);
ctx.lineTo(right,yPos);
ctx.stroke();

meses.forEach((m,i)=>{
const xPos=x.getPixelForValue(i);

ctx.beginPath();
ctx.arc(xPos,yPos,5,0,Math.PI*2);
ctx.fillStyle='yellow';
ctx.fill();

ctx.fillStyle='white';
ctx.fillText(percArr[i].toFixed(0)+'%',xPos,yPos+15);
ctx.fillText(f(lucroArr[i]),xPos,yPos+28);
});
}
}
]
});

/* DONUT + LEGENDA RESTAURADOS */
function cor(l){
if(l.includes("70")) return "#4CAF50";
if(l.includes("50")) return "#FFD966";
if(l.includes("40")) return "#ff7b7b";
return "#999";
}

const labels=Object.keys(mapPizza);

new Chart(graficoDonut,{
type:'doughnut',
data:{
labels:labels,
datasets:[{
data:labels.map(l=>mapPizza[l].qtd),
backgroundColor:labels.map(l=>cor(l))
}]
},
options:{plugins:{legend:{display:false}}}
});

/* LEGENDA BONITA */
labels.forEach(l=>{
let div=document.createElement("div");
div.innerHTML=`${l} | Qtd ${mapPizza[l].qtd} | ${f(mapPizza[l].valor)}`;
legendaCustom.appendChild(div);
});

/* TABELA COM TOTAL */
const mesesTabela=Array.from(mesesSet).sort((a,b)=>{
let [m1,y1]=a.split('/'),[m2,y2]=b.split('/');
return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
});

let html="<tr><th>Cliente</th>";
mesesTabela.forEach(m=>html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

let totalGeral=0,totMes={};
mesesTabela.forEach(m=>totMes[m]=0);

Object.entries(matriz50).forEach(([c,d])=>{
let total=0,row=`<tr><td>${c}</td>`;
mesesTabela.forEach(m=>{
let v=d[m]||0; total+=v; totMes[m]+=v;
row+=`<td>${v?f(v):""}</td>`;
});
totalGeral+=total;
row+=`<td>${f(total)}</td></tr>`;
html+=row;
});

html+=`<tr><td>Total</td>`;
mesesTabela.forEach(m=>html+=`<td>${f(totMes[m])}</td>`);
html+=`<td>${f(totalGeral)}</td></tr>`;

tabela50.innerHTML=html;

});

/* ================= PETROLEO ================= */

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1261021270&single=true&output=csv")
.then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

let map={},matriz={},mesesSet=new Set();

linhas.slice(1).forEach(l=>{
let c=l[1],v=br(l[19]),mes=mesAno(l[7]);

if(!map[c]) map[c]={qtd:0,valor:0};
map[c].qtd++; map[c].valor+=v;

if(mes){
mesesSet.add(mes);
if(!matriz[c]) matriz[c]={};
matriz[c][mes]=(matriz[c][mes]||0)+v;
}
});

/* ORDENAR MESES */
const meses=Array.from(mesesSet).sort((a,b)=>{
let [m1,y1]=a.split('/'),[m2,y2]=b.split('/');
return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
});

/* DONUT */
new Chart(graficoDonutPetroleo,{
type:'doughnut',
data:{labels:Object.keys(map),datasets:[{data:Object.values(map).map(x=>x.qtd)}]}
});

/* LEGENDA */
Object.keys(map).forEach(l=>{
let div=document.createElement("div");
div.innerHTML=`${l} | Qtd ${map[l].qtd} | ${f(map[l].valor)}`;
legendaPetroleo.appendChild(div);
});

/* TABELA COM TOTAL */
let html="<tr><th>Cliente</th>";
meses.forEach(m=>html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

let totalGeral=0,totMes={};
meses.forEach(m=>totMes[m]=0);

Object.entries(matriz).forEach(([c,d])=>{
let total=0,row=`<tr><td>${c}</td>`;
meses.forEach(m=>{
let v=d[m]||0; total+=v; totMes[m]+=v;
row+=`<td>${v?f(v):""}</td>`;
});
totalGeral+=total;
row+=`<td>${f(total)}</td></tr>`;
html+=row;
});

html+=`<tr><td>Total</td>`;
meses.forEach(m=>html+=`<td>${f(totMes[m])}</td>`);
html+=`<td>${f(totalGeral)}</td></tr>`;

tabelaPetroleo.innerHTML=html;

});

</script>

</body>
</html>
