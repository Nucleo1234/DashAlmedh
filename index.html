<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<style>

/* ===== RESET ===== */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: Arial;
    background:#f4f7fb;
}

/* ===== HEADER ===== */
.header {
    background:#184a5a;
    color:white;
    padding:15px 25px;
    font-size:20px;
    font-weight:bold;
}

/* ===== MENU ABAS ===== */
.tabs {
    display:flex;
    background:white;
    border-bottom:2px solid #ddd;
}

.tab-button {
    padding:14px 20px;
    cursor:pointer;
    border:none;
    background:none;
    font-weight:bold;
    color:#555;
    transition:0.3s;
}

.tab-button:hover {
    background:#f1f1f1;
}

.tab-button.active {
    color:#184a5a;
    border-bottom:3px solid #184a5a;
}

/* ===== CONTEÚDO ===== */
.tab-content {
    display:none;
    padding:20px;
}

.tab-content.active {
    display:block;
}

/* ===== CONTAINER PADRÃO ===== */
.aba-box {
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* ===== PLACEHOLDER ===== */
.placeholder {
    text-align:center;
    color:#888;
    padding:40px;
    border:2px dashed #ccc;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
Dashboard Financeiro e Operacional
</div>

<!-- ===== ABAS ===== -->
<div class="tabs">
    <button class="tab-button active" onclick="openTab(event, 'aba1')">Performance e Indicadores</button>
    <button class="tab-button" onclick="openTab(event, 'aba2')">Conciliação Bancária</button>
    <button class="tab-button" onclick="openTab(event, 'aba3')">Fluxo de Caixa Projetado</button>
    <button class="tab-button" onclick="openTab(event, 'aba4')">Fluxo Projetado vs Realizado</button>
</div>

<!-- ===== ABA 1 ===== -->
<div id="aba1" class="tab-content active">
    <div class="aba-box">

        <!-- 👉 COLE SEU DASHBOARD AQUI (SEM <body> e SEM <style>) -->
        <iframe src="aba1.html" style="width:100%; height:1500px; border:none;"></iframe>

    </div>
</div>

<!-- ===== ABA 2 ===== -->	
<div id="aba2" class="tab-content">
    <div class="aba-box">
        <iframe src="aba1.html" style="width:100%; height:1500px; border:none;"></iframe>
    </div>
</div>

<!-- ===== ABA 3 ===== -->
<div id="aba3" class="tab-content">
    <iframe src="aba3.html" style="width:100%; height:1500px; border:none;"></iframe>
    </div>
</div>

<!-- ===== ABA 4 ===== -->
<div id="aba4" class="tab-content">
    <iframe src="aba4.html" style="width:100%; height:1500px; border:none;"></iframe>
    </div>
</div>

<script>

function openTab(evt, tabName) {

    let i, tabcontent, tabbuttons;

    tabcontent = document.getElementsByClassName("tab-content");
    for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].classList.remove("active");
    }

    tabbuttons = document.getElementsByClassName("tab-button");
    for (i = 0; i < tabbuttons.length; i++) {
        tabbuttons[i].classList.remove("active");
    }

    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

</script>

</body>
</html>
