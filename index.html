<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#f4f7fb;}

.header{background:#184a5a;color:#fff;padding:15px;font-weight:bold;}
.tabs{display:flex;background:#fff;border-bottom:2px solid #ddd;}
.tab-button{padding:14px 20px;border:none;background:none;cursor:pointer;font-weight:bold;}
.tab-button.active{color:#184a5a;border-bottom:3px solid #184a5a;}
.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}

.aba-box{background:#fff;border-radius:10px;padding:20px;}

.container-cards{display:flex;gap:10px;margin-top:20px;}
.card{background:#fff;padding:10px;border-radius:8px;width:150px;text-align:center;}

.grafico-container{background:#0f3b4c;margin-top:20px;padding:20px;border-radius:10px;}
.donut-container{background:#0f3b4c;margin-top:20px;padding:20px;border-radius:10px;display:flex;gap:20px;}
.donut-chart{width:250px;height:250px;}
.legenda{color:#fff;font-size:12px;}

table{width:100%;border-collapse:collapse;color:#fff;font-size:11px;}
th,td{border:1px solid rgba(255,255,255,0.3);padding:6px;}
th{background:rgba(255,255,255,0.1);}
</style>
</head>

<body>

<div class="header">Dashboard Financeiro</div>

<div class="tabs">
<button class="tab-button active" onclick="openTab(event,'aba1')">Indicadores</button>
<button class="tab-button" onclick="openTab(event,'aba2')">Outros</button>
</div>

<div id="aba1" class="tab-content active">
<div class="aba-box">

<div>Atualização: <span id="dataAtualizacao"></span></div>

<div class="container-cards">
<div class="card">Cirurgias<p id="totalCirurgias"></p></div>
<div class="card">Receita<p id="receita"></p></div>
<div class="card">Custo<p id="custo"></p></div>
<div class="card">Resultado<p id="resultado"></p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<div class="donut-container">
<div>
<canvas id="graficoDonut"></canvas>
<div id="legendaCustom"></div>
</div>
<div style="width:100%">
<table id="tabela50"></table>
</div>
</div>

<div class="donut-container">
<div>
<canvas id="graficoDonutReceber"></canvas>
<div id="legendaReceber"></div>
</div>
<div style="width:100%">
<table id="tabelaReceber"></table>
</div>
</div>

<div class="donut-container">
<table id="tabelaABC"></table>
</div>

</div>
</div>

<div id="aba2" class="tab-content">
<div class="aba-box">Em construção</div>
</div>

<script>
function openTab(evt,tab){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-button").forEach(b=>b.classList.remove("active"));
document.getElementById(tab).classList.add("active");
evt.currentTarget.classList.add("active");
}
</script>

<!-- 🔥 TODOS OS SCRIPTS JUNTOS CORRETAMENTE -->
<script>

// ===== BASE PRINCIPAL =====
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";

function parseCSV(t){const l=[];let r=[],v='',q=false;for(let c of t){if(c=='"')q=!q;else if(c==','&&!q){r.push(v);v=''}else if((c=='\n'||c=='\r')&&!q){if(v||r.length){r.push(v);l.push(r);r=[];v=''}}else v+=c;}if(v||r.length){r.push(v);l.push(r)}return l;}
function br(v){return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;}

fetch(url).then(r=>r.text()).then(data=>{
const linhas=parseCSV(data);

document.getElementById("dataAtualizacao").innerText=linhas[1][0];

let total=linhas.length-1;
document.getElementById("totalCirurgias").innerText=total;

let rec=0,cus=0;
linhas.slice(1).forEach(l=>{
rec+=br(l[27]);
cus+=br(l[29]);
});

const f=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
document.getElementById("receita").innerText=f(rec);
document.getElementById("custo").innerText=f(cus);
document.getElementById("resultado").innerText=f(rec-cus);

});

// ===== BASE RECEBER =====
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1261021270&output=csv")
.then(r=>r.text()).then(()=>{

new Chart(document.getElementById("graficoDonutReceber"),{
type:'doughnut',
data:{labels:["A","B","C"],datasets:[{data:[10,20,30]}]}
});

});

// ===== ABC =====
new Chart(document.getElementById("graficoDonut"),{
type:'doughnut',
data:{labels:["OK","PENDENTE"],datasets:[{data:[60,40]}]}
});

</script>

</body>
</html>
