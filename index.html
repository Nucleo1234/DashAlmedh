<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>

/* ===== RESET ===== */
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:Arial;background:#f4f7fb;}

/* HEADER */
.header {
    background:#184a5a;
    color:white;
    padding:15px 25px;
    font-size:20px;
    font-weight:bold;
}

/* ABAS */
.tabs {
    display:flex;
    background:white;
    border-bottom:2px solid #ddd;
}

.tab-button {
    padding:14px 20px;
    cursor:pointer;
    border:none;
    background:none;
    font-weight:bold;
    color:#555;
}

.tab-button.active {
    color:#184a5a;
    border-bottom:3px solid #184a5a;
}

.tab-content {
    display:none;
    padding:20px;
}

.tab-content.active {
    display:block;
}

/* ===== ESTILO ABA 1 ===== */

.topo { font-size:13px; font-weight:bold; }

.titulo {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.grafico-container {
    width:100%;
    height:450px;
    margin-top:30px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

.donut-container {
    width:100%;
    margin-top:30px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:30px;
    align-items:flex-start;
}

.donut-chart {
    width:250px !important;
    height:250px !important;
}

.legenda { color:white; font-size:12px; }

.legenda-item {
    display:flex;
    align-items:center;
    margin-bottom:6px;
}

.cor-box {
    width:12px;
    height:12px;
    margin-right:6px;
}

/* TABELAS */
table {
    border-collapse:collapse;
    width:100%;
    font-size:11px;
    color:white;
}

th, td {
    padding:6px;
    border:1px solid rgba(255,255,255,0.3);
}

th {
    background:rgba(255,255,255,0.1);
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
Dashboard Financeiro e Operacional
</div>

<div class="tabs">
<button class="tab-button active" onclick="openTab(event,'aba1')">Performance</button>
<button class="tab-button" onclick="openTab(event,'aba2')">Conciliação</button>
<button class="tab-button" onclick="openTab(event,'aba3')">Fluxo</button>
</div>

<!-- ================= ABA 1 ================= -->
<div id="aba1" class="tab-content active">

<div class="topo">
Data: <span id="dataAtualizacao">...</span>
</div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total Cirurgias</h3><p id="totalCirurgias">...</p></div>
<div class="card"><h3>Receita</h3><p id="receita">...</p></div>
<div class="card"><h3>Custo</h3><p id="custo">...</p></div>
<div class="card"><h3>Resultado</h3><p id="resultado">...</p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<div class="donut-container">

<div>
<canvas id="graficoDonut" class="donut-chart"></canvas>
<div id="legendaCustom" class="legenda"></div>
</div>

<div style="width:100%;">
<h3 style="color:white;">Cirurgias - Faturar</h3>
<table id="tabela50"></table>
</div>

</div>

<div class="donut-container">

<div>
<canvas id="graficoDonutReceber" class="donut-chart"></canvas>
<div id="legendaReceber" class="legenda"></div>
</div>

<div style="width:100%;">
<h3 style="color:white;">Valores a Receber</h3>
<table id="tabelaReceber"></table>
</div>

</div>

<div class="donut-container">

<div style="width:100%;">
<h3 style="color:white;">Curva ABC</h3>
<table id="tabelaABC"></table>
</div>

</div>

</div>

<!-- OUTRAS ABAS -->
<div id="aba2" class="tab-content">Em construção</div>
<div id="aba3" class="tab-content">Em construção</div>

<script>
function openTab(evt, tabName){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-button").forEach(b=>b.classList.remove("active"));
document.getElementById(tabName).classList.add("active");
evt.currentTarget.classList.add("active");
}
</script>
