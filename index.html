<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

/* ===== MENU ===== */
.menu {
    display:flex;
    background:#1f2937;
}

.menu button {
    flex:1;
    padding:15px;
    border:none;
    background:none;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.menu button.active {
    background:#2563eb;
}

/* ===== ABAS ===== */
.aba {
    display:none;
    padding:20px;
}

/* ===== ABA 1 ESTILO ===== */
.topo { font-size:13px; font-weight:bold; }

.titulo {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.grafico-container {
    width:90%;
    height:400px;
    margin:30px auto;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
    <button onclick="abrirAba('aba1', this)" class="active">Performance e Indicadores</button>
    <button onclick="abrirAba('aba2', this)">Conciliação Bancária</button>
    <button onclick="abrirAba('aba3', this)">Fluxo de Caixa Projetado</button>
    <button onclick="abrirAba('aba4', this)">Projetado vs Realizado</button>
</div>

<!-- ===== ABA 1 ===== -->
<div id="aba1" class="aba" style="display:block;">

<div class="topo">
Data de Atualização: <span id="dataAtualizacao">...</span>
</div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total</h3><p id="totalCirurgias">...</p></div>
<div class="card"><h3>Receita</h3><p id="receita">...</p></div>
<div class="card"><h3>Custo</h3><p id="custo">...</p></div>
<div class="card"><h3>Resultado</h3><p id="resultado">...</p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<div class="grafico-container">
<canvas id="graficoDonut"></canvas>
</div>

</div>

<!-- OUTRAS ABAS (VAZIAS POR ENQUANTO) -->
<div id="aba2" class="aba">Cole aqui Conciliação</div>
<div id="aba3" class="aba">Cole aqui Fluxo Projetado</div>
<div id="aba4" class="aba">Cole aqui Comparação</div>

<script>

/* ===== CONTROLE DE ABAS ===== */
function abrirAba(id, botao){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));

    document.getElementById(id).style.display='block';
    botao.classList.add('active');

    if(id === 'aba1' && !window.carregado){
        carregarDashboard();
        window.carregado = true;
    }
}

/* ===== DASHBOARD ===== */
function carregarDashboard(){

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";

function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function mesAno(d){
    if(!d||!d.includes("/"))return "";
    let p=d.split("/");
    return p[1]+"/"+p[2].slice(-2);
}

fetch(url).then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

document.getElementById("dataAtualizacao").innerText = linhas[1][0];

let map={},recT=0,cusT=0;
let mapPizza={};

linhas.slice(1).forEach(l=>{
    let mes=mesAno(l[5]);
    let rec=br(l[27]);
    let cus=br(l[29]);

    recT+=rec;
    cusT+=cus;

    if(mes){
        if(!map[mes]) map[mes]={rec:0,cus:0};
        map[mes].rec+=rec;
        map[mes].cus+=cus;
    }

    let situacao=l[4];
    if(!mapPizza[situacao]) mapPizza[situacao]=0;
    mapPizza[situacao]++;
});

const f=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

document.getElementById("receita").innerText=f(recT);
document.getElementById("custo").innerText=f(cusT);
document.getElementById("resultado").innerText=f(recT-cusT);
document.getElementById("totalCirurgias").innerText=linhas.length-1;

/* ===== GRÁFICO ===== */
const meses=Object.keys(map);

new Chart(document.getElementById("graficoMensal"),{
type:'bar',
data:{
labels:meses,
datasets:[
{data:meses.map(m=>map[m].cus), backgroundColor:'#ff7b7b'},
{data:meses.map(m=>map[m].rec), backgroundColor:'#4CAF50'}
]
}
});

/* ===== DONUT ===== */
new Chart(document.getElementById("graficoDonut"),{
type:'doughnut',
data:{
labels:Object.keys(mapPizza),
datasets:[{data:Object.values(mapPizza)}]
}
});

});

}

</script>

</body>
</html>
