<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#cfe8ff; padding:20px; }

.topo { font-size:13px; font-weight:bold; }

.titulo {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:30px;
}

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card h3 { font-size:12px; margin:0; }
.card p { font-size:16px; font-weight:bold; }

.grafico-container {
    width:90%;
    height:500px;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

.donut-container {
    width:90%;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:30px;
    align-items:flex-start;
}

.donut-chart {
    width:250px !important;
    height:250px !important;
}

.legenda {
    color:white;
    font-size:12px;
    margin-top:20px;
}

.legenda-item {
    display:flex;
    align-items:center;
    margin-bottom:8px;
}

.cor-box {
    width:12px;
    height:12px;
    margin-right:8px;
}

table {
    border-collapse:collapse;
    font-size:11px;
    width:100%;
}

th, td {
    padding:6px 8px;
    border:1px solid rgba(255,255,255,0.3);
    color:white;
}

th {
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="topo">
Data de Atualização: <span id="dataAtualizacao">...</span>
</div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total de Cirurgias</h3><p id="totalCirurgias">...</p></div>
<div class="card"><h3>Receita Bruta R$</h3><p id="receita">...</p></div>
<div class="card"><h3>Custo R$</h3><p id="custo">...</p></div>
<div class="card"><h3>Resultado Bruto R$</h3><p id="resultado">...</p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<!-- BLOCO 1 -->
<div class="donut-container">
<div>
<canvas id="graficoDonut" class="donut-chart"></canvas>
<div id="legendaCustom" class="legenda"></div>
</div>

<div>
<h3>Cirurgias - Faturar</h3>
<table id="tabela50"></table>
</div>
</div>

<!-- BLOCO 2 -->
<div class="donut-container">
<div>
<canvas id="graficoDonutPetroleo" class="donut-chart"></canvas>
<div id="legendaPetroleo" class="legenda"></div>
</div>

<div>
<h3>Fundo Petróleo</h3>
<table id="tabelaPetroleo"></table>
</div>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";
const urlPetroleo = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1261021270&single=true&output=csv";

function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function mesAno(d){
    if(!d||!d.includes("/"))return "";
    let p=d.split("/");
    return p[1]+"/"+p[2].slice(-2);
}

const f=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

/* ================= DASHBOARD PRINCIPAL ================= */

fetch(url).then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

document.getElementById("dataAtualizacao").innerText = linhas[1][0];

let map={},mapPizza={},matriz50={},mesesSet=new Set();
let recT=0,cusT=0;

linhas.slice(1).forEach(l=>{
let vale=l[2],situacao=l[4],mes=mesAno(l[5]);
let rec=br(l[27]),cus=br(l[29]);

recT+=rec;cusT+=cus;

if(mes){
if(!map[mes]) map[mes]={rec:0,cus:0};
map[mes].rec+=rec; map[mes].cus+=cus;
}

if(!mapPizza[situacao]) mapPizza[situacao]={qtd:0,valor:0,vales:{}};
if(!mapPizza[situacao].vales[vale]){
mapPizza[situacao].qtd++;
mapPizza[situacao].vales[vale]=true;
}
mapPizza[situacao].valor+=rec;

let cliente=l[8],mes50=mesAno(l[5]);
if(situacao?.includes("50") && cliente && mes50){
mesesSet.add(mes50);
if(!matriz50[cliente]) matriz50[cliente]={};
if(!matriz50[cliente][mes50]) matriz50[cliente][mes50]=0;
matriz50[cliente][mes50]+=rec;
}
});

/* ===== GRÁFICO MENSAL ===== */
const meses=Object.keys(map).sort((a,b)=>{
let [m1,y1]=a.split('/'),[m2,y2]=b.split('/');
return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
});

const recArr=meses.map(m=>map[m].rec);
const cusArr=meses.map(m=>map[m].cus);

new Chart(graficoMensal,{type:'bar',
data:{labels:meses,datasets:[
{data:cusArr,backgroundColor:'#ff7b7b'},
{data:recArr,backgroundColor:'#4CAF50'}
]},
options:{plugins:{legend:{display:false}},
scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}
});

/* ===== DONUT ===== */
const labels=Object.keys(mapPizza);
const dados=labels.map(l=>mapPizza[l].qtd);

new Chart(graficoDonut,{
type:'doughnut',
data:{labels,datasets:[{data:dados}]},
options:{plugins:{legend:{display:false}}}
});

/* ===== LEGENDA ===== */
labels.forEach(l=>{
let div=document.createElement("div");
div.className="legenda-item";
div.innerHTML=`<div>${l} | Qtd ${mapPizza[l].qtd} | ${f(mapPizza[l].valor)}</div>`;
legendaCustom.appendChild(div);
});

/* ===== TABELA ===== */
const mesesTabela=Array.from(mesesSet);
let html="<tr><th>Cliente</th>";
mesesTabela.forEach(m=>html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

Object.entries(matriz50).forEach(([c,d])=>{
let total=0,linha=`<tr><td>${c}</td>`;
mesesTabela.forEach(m=>{
let v=d[m]||0; total+=v;
linha+=`<td>${v?f(v):""}</td>`;
});
linha+=`<td>${f(total)}</td></tr>`;
html+=linha;
});
tabela50.innerHTML=html;

});

/* ================= FUNDO PETRÓLEO ================= */

fetch(urlPetroleo).then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

let map={},matriz={},mesesSet=new Set();

linhas.slice(1).forEach(l=>{
let cliente=l[1],venc=l[7],valor=br(l[19]);
let mes=mesAno(venc);

if(!cliente) return;

if(!map[cliente]) map[cliente]={qtd:0,valor:0};
map[cliente].qtd++; map[cliente].valor+=valor;

if(mes){
mesesSet.add(mes);
if(!matriz[cliente]) matriz[cliente]={};
if(!matriz[cliente][mes]) matriz[cliente][mes]=0;
matriz[cliente][mes]+=valor;
}
});

/* DONUT */
const labels=Object.keys(map);
new Chart(graficoDonutPetroleo,{
type:'doughnut',
data:{labels,datasets:[{data:labels.map(l=>map[l].qtd)}]},
options:{plugins:{legend:{display:false}}}
});

/* LEGENDA */
labels.forEach(l=>{
let div=document.createElement("div");
div.className="legenda-item";
div.innerHTML=`<div>${l} | Qtd ${map[l].qtd} | ${f(map[l].valor)}</div>`;
legendaPetroleo.appendChild(div);
});

/* TABELA */
let html="<tr><th>Cliente</th>";
let meses=Array.from(mesesSet);
meses.forEach(m=>html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

Object.entries(matriz).forEach(([c,d])=>{
let total=0,linha=`<tr><td>${c}</td>`;
meses.forEach(m=>{
let v=d[m]||0; total+=v;
linha+=`<td>${v?f(v):""}</td>`;
});
linha+=`<td>${f(total)}</td></tr>`;
html+=linha;
});
tabelaPetroleo.innerHTML=html;

});

</script>

</body>
</html>
