<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #cfe8ff;
        margin: 0;
        padding: 20px;
    }

    .topo {
        font-size: 14px;
        font-weight: bold;
    }

    .titulo {
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        margin-top: 40px;
        color: black;
    }

    .container-cards {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .card {
        width: 180px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    .card h3 {
        margin: 0;
        font-size: 14px;
    }

    .card p {
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="topo">
    Data de Atualização: <span id="dataAtualizacao">Carregando...</span>
</div>

<div class="titulo">
    Indicadores de Performance
</div>

<div class="container-cards">
    
    <div class="card">
        <h3>Total de Cirurgias</h3>
        <p id="totalCirurgias">...</p>
    </div>

    <div class="card">
        <h3>Receita Bruta R$</h3>
        <p id="receita">...</p>
    </div>

    <div class="card">
        <h3>Custo R$</h3>
        <p id="custo">...</p>
    </div>

    <div class="card">
        <h3>Resultado Bruto R$</h3>
        <p id="resultado">...</p>
    </div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&single=true&output=csv";

fetch(url)
.then(response => response.text())
.then(data => {

    // 🔥 TESTE: verificar se carregou
    console.log("DADOS CARREGADOS:");
    console.log(data);

    document.getElementById("dataAtualizacao").innerText = "OK - carregou";

})
.catch(error => {
    console.error("ERRO:", error);
    document.getElementById("dataAtualizacao").innerText = "ERRO AO CARREGAR";
});

</script>

</body>
</html>
