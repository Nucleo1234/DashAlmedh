<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    background-color: #cfe8ff;
    padding: 20px;
}

.topo {
    font-size: 14px;
    font-weight: bold;
}

.titulo {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-top: 40px;
}

.container-cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.card {
    width: 180px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card p {
    font-size: 20px;
    font-weight: bold;
}

.grafico-container {
    width: 80%;
    height: 400px;
    margin-top: 50px;
    background-color: #0f3b4c;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="topo">
    Data de Atualização: <span id="dataAtualizacao">...</span>
</div>

<div class="titulo">
    Indicadores de Performance
</div>

<div class="container-cards">
    <div class="card"><h3>Total de Cirurgias</h3><p id="totalCirurgias">...</p></div>
    <div class="card"><h3>Receita Bruta R$</h3><p id="receita">...</p></div>
    <div class="card"><h3>Custo R$</h3><p id="custo">...</p></div>
    <div class="card"><h3>Resultado Bruto R$</h3><p id="resultado">...</p></div>
</div>

<div class="grafico-container">
    <canvas id="graficoMensal"></canvas>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv";

function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

function br(v){
    return parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
}

function mesAno(d){
    if(!d||!d.includes("/"))return "";
    let p=d.split("/");
    return p[1]+"/"+p[2].slice(-2);
}

fetch(url).then(r=>r.text()).then(data=>{

    const linhas=parseCSV(data);

    document.getElementById("dataAtualizacao").innerText = linhas[1][0];

    const vales = linhas.slice(1).map(l => l[2]).filter(v => v);
    document.getElementById("totalCirurgias").innerText = [...new Set(vales)].length;

    let map={},recT=0,cusT=0;

    linhas.slice(1).forEach(l=>{

        let mes=mesAno(l[5]);
        if(!mes)return;

        let rec=br(l[26]);
        let cus=br(l[29]);

        recT+=rec; 
        cusT+=cus;

        if(!map[mes]) map[mes]={rec:0,cus:0};

        map[mes].rec+=rec;
        map[mes].cus+=cus;
    });

    const formatar = v => v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

    document.getElementById("receita").innerText = formatar(recT);
    document.getElementById("custo").innerText = formatar(cusT);
    document.getElementById("resultado").innerText = formatar(recT - cusT);

    const meses=Object.keys(map).sort((a,b)=>{
        let [m1,y1]=a.split('/');
        let [m2,y2]=b.split('/');
        return new Date(`20${y1}`,m1-1)-new Date(`20${y2}`,m2-1);
    });

    const rec=meses.map(m=>map[m].rec);
    const cus=meses.map(m=>map[m].cus);
    const lucro=meses.map(m=>map[m].rec-map[m].cus);
    const perc=meses.map(m=>{
        let l=map[m].rec-map[m].cus;
        return map[m].cus ? (l/map[m].cus)*100 : 0;
    });

    new Chart(document.getElementById("graficoMensal"),{
        type:'bar',
        data:{
            labels:meses,
            datasets:[
                {data:cus,backgroundColor:'#ff7b7b'},
                {data:rec,backgroundColor:'#4CAF50'}
            ]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                legend:{display:false} // 🔥 REMOVE LEGENDA
            },
            scales:{
                x:{ticks:{color:'white'}},
                y:{ticks:{color:'white'}}
            }
        },
        plugins:[

        // 🔥 VALORES NAS BARRAS
        {
            id:'labelsBarras',
            afterDatasetsDraw(chart){
                const {ctx}=chart;

                chart.data.datasets.forEach((dataset,i)=>{
                    const meta=chart.getDatasetMeta(i);

                    meta.data.forEach((bar,index)=>{
                        const valor=dataset.data[index];

                        ctx.fillStyle='white';
                        ctx.font='10px Arial';
                        ctx.textAlign='center';

                        ctx.fillText(
                            valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}),
                            bar.x,
                            bar.y-5
                        );
                    });
                });
            }
        },

        // 🔥 LINHA + INDICADORES
        {
            id:'linhaTopo',
            afterDraw(chart){

                const {ctx,chartArea:{left,right},scales:{x,y}}=chart;

                const max=Math.max(...rec,...cus);
                const yPos=y.getPixelForValue(max*1.15);

                ctx.strokeStyle='white';
                ctx.lineWidth=2;
                ctx.beginPath();
                ctx.moveTo(left,yPos);
                ctx.lineTo(right,yPos);
                ctx.stroke();

                meses.forEach((m,i)=>{

                    const xPos=x.getPixelForValue(i);

                    ctx.beginPath();
                    ctx.arc(xPos,yPos,5,0,Math.PI*2);
                    ctx.fillStyle='yellow';
                    ctx.fill();

                    ctx.fillStyle='white';
                    ctx.font='10px Arial';

                    ctx.fillText(perc[i].toFixed(0)+'%', xPos, yPos+15);

                    ctx.fillText(
                        lucro[i].toLocaleString("pt-BR",{style:"currency",currency:"BRL"}),
                        xPos,
                        yPos+28
                    );
                });
            }
        }

        ]
    });

});

</script>

</body>
</html>
