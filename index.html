<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #cfe8ff;
        margin: 0;
        padding: 20px;
    }

    .topo {
        font-size: 14px;
        font-weight: bold;
    }

    .titulo {
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        margin-top: 40px;
    }

    .container-cards {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .card {
        width: 180px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    .card p {
        font-size: 20px;
        font-weight: bold;
    }

    .grafico-container {
        width: 80%;
        height: 350px;
        margin-top: 50px;
        background-color: #0f3b4c; /* 🔥 AZUL PETRÓLEO ESCURO */
        padding: 20px;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="topo">
    Data de Atualização: <span id="dataAtualizacao">Carregando...</span>
</div>

<div class="titulo">
    Indicadores de Performance
</div>

<div class="container-cards">
    <div class="card">
        <h3>Total de Cirurgias</h3>
        <p id="totalCirurgias">...</p>
    </div>

    <div class="card">
        <h3>Receita Bruta R$</h3>
        <p id="receita">...</p>
    </div>

    <div class="card">
        <h3>Custo R$</h3>
        <p id="custo">...</p>
    </div>

    <div class="card">
        <h3>Resultado Bruto R$</h3>
        <p id="resultado">...</p>
    </div>
</div>

<div class="grafico-container">
    <canvas id="graficoMensal"></canvas>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&single=true&output=csv";

function parseCSV(texto) {
    const linhas = [];
    let linha = [], valor = '', dentroAspas = false;

    for (let char of texto) {
        if (char === '"') dentroAspas = !dentroAspas;
        else if (char === ',' && !dentroAspas) {
            linha.push(valor);
            valor = '';
        }
        else if ((char === '\n' || char === '\r') && !dentroAspas) {
            if (valor || linha.length) {
                linha.push(valor);
                linhas.push(linha);
                linha = [];
                valor = '';
            }
        } else valor += char;
    }

    if (valor || linha.length) {
        linha.push(valor);
        linhas.push(linha);
    }

    return linhas;
}

function parseBR(v) {
    if (!v) return 0;
    return parseFloat(
        v.replace(/\./g,'')
         .replace(',','.')
         .replace(/"/g,'')
         .trim()
    ) || 0;
}

function getMesAno(data) {
    if (!data || !data.includes("/")) return "";
    const p = data.split("/");
    return p[1] + "/" + p[2].slice(-2);
}

fetch(url)
.then(r => r.text())
.then(data => {

    const linhas = parseCSV(data);

    document.getElementById("dataAtualizacao").innerText = linhas[1][0];

    const vales = linhas.slice(1).map(l => l[2]).filter(v => v);
    document.getElementById("totalCirurgias").innerText = [...new Set(vales)].length;

    let receitaTotal = 0, custoTotal = 0;
    const mesesMap = {};

    linhas.slice(1).forEach(l => {

        const dataCirurgia = l[5];
        const mes = getMesAno(dataCirurgia);

        if (!mes) return;

        const receita = parseBR(l[26]);
        const custo = parseBR(l[29]);

        receitaTotal += receita;
        custoTotal += custo;

        if (!mesesMap[mes]) {
            mesesMap[mes] = { receita: 0, custo: 0 };
        }

        mesesMap[mes].receita += receita;
        mesesMap[mes].custo += custo;
    });

    const resultado = receitaTotal - custoTotal;

    const formatar = v =>
        v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

    document.getElementById("receita").innerText = formatar(receitaTotal);
    document.getElementById("custo").innerText = formatar(custoTotal);
    document.getElementById("resultado").innerText = formatar(resultado);

    const meses = Object.keys(mesesMap).sort((a, b) => {
        const [mesA, anoA] = a.split('/');
        const [mesB, anoB] = b.split('/');

        return new Date(`20${anoA}`, mesA - 1) - new Date(`20${anoB}`, mesB - 1);
    });

    const receitas = meses.map(m => mesesMap[m].receita);
    const custos = meses.map(m => mesesMap[m].custo);

    new Chart(document.getElementById("graficoMensal"), {
        type: 'bar',
        data: {
            labels: meses,
            datasets: [
                { label: 'Custo', data: custos, backgroundColor: '#ff7b7b' },
                { label: 'Receita', data: receitas, backgroundColor: '#4CAF50' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            },
            scales: {
                x: { ticks: { color: 'white' } },
                y: {
                    ticks: {
                        color: 'white',
                        callback: v => v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
                    }
                }
            }
        },
        plugins: [{
            id: 'labels',
            afterDatasetsDraw(chart) {
                const { ctx } = chart;

                chart.data.datasets.forEach((dataset, i) => {
                    const meta = chart.getDatasetMeta(i);

                    meta.data.forEach((bar, index) => {
                        const valor = dataset.data[index];

                        ctx.fillStyle = 'white'; // 🔥 BRANCO
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'center';

                        ctx.fillText(
                            valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}),
                            bar.x,
                            bar.y - 5
                        );
                    });
                });
            }
        }]
    });

})
.catch(err => console.error(err));

</script>

</body>
</html>
