<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Indicadores</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#cfe8ff; padding:20px; }

.topo { font-size:13px; font-weight:bold; }

.titulo {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:30px;
}

.container-cards {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.card {
    width:150px;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.grafico-container {
    width:90%;
    height:500px;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
}

.donut-container {
    width:90%;
    margin-top:40px;
    background:#0f3b4c;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:30px;
}

h3 { color:white; }

table {
    border-collapse:collapse;
    font-size:11px;
    width:100%;
    color:white;
}

th, td {
    border:1px solid rgba(255,255,255,0.3);
    padding:6px;
}

</style>
</head>

<body>

<div class="topo">Data: <span id="dataAtualizacao"></span></div>

<div class="titulo">Indicadores de Performance</div>

<div class="container-cards">
<div class="card"><h3>Total</h3><p id="totalCirurgias"></p></div>
<div class="card"><h3>Receita</h3><p id="receita"></p></div>
<div class="card"><h3>Custo</h3><p id="custo"></p></div>
<div class="card"><h3>Resultado</h3><p id="resultado"></p></div>
</div>

<div class="grafico-container">
<canvas id="graficoMensal"></canvas>
</div>

<!-- CIRURGIAS -->
<div class="donut-container">
<div>
<canvas id="graficoDonut" width="250"></canvas>
<div id="legendaCustom"></div>
</div>

<div>
<h3>Cirurgias - Faturar</h3>
<table id="tabela50"></table>
</div>
</div>

<!-- PETROLEO -->
<div class="donut-container">
<div>
<canvas id="graficoDonutPetroleo" width="250"></canvas>
<div id="legendaPetroleo"></div>
</div>

<div>
<h3>Valores a Receber</h3>
<table id="tabelaPetroleo"></table>
</div>
</div>

<script>

/* ===== FUNÇÕES ===== */
function parseCSV(t){
    const l=[];let r=[],v='',q=false;
    for(let c of t){
        if(c=='"')q=!q;
        else if(c==','&&!q){r.push(v);v=''}
        else if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);l.push(r);r=[];v=''}
        } else v+=c;
    }
    if(v||r.length){r.push(v);l.push(r)}
    return l;
}

const br=v=>parseFloat(v?.replace(/\./g,'').replace(',','.'))||0;
const f=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const mesAno=d=>d?d.split("/")[1]+"/"+d.split("/")[2].slice(-2):"";

/* ================= PRINCIPAL ================= */

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1391018010&output=csv")
.then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

let map={},pizza={},matriz={},mesesSet=new Set();
let recT=0,cusT=0;

linhas.slice(1).forEach(l=>{
let mes=mesAno(l[5]),rec=br(l[27]),cus=br(l[29]);
let situ=l[4],cliente=l[8];

recT+=rec;cusT+=cus;

if(mes){
if(!map[mes]) map[mes]={rec:0,cus:0};
map[mes].rec+=rec; map[mes].cus+=cus;
}

if(!pizza[situ]) pizza[situ]={qtd:0,valor:0,vales:{}};
if(!pizza[situ].vales[l[2]]){pizza[situ].qtd++; pizza[situ].vales[l[2]]=1;}
pizza[situ].valor+=rec;

/* MATRIZ 50 */
if(situ?.includes("50") && cliente){
mesesSet.add(mes);
if(!matriz[cliente]) matriz[cliente]={};
matriz[cliente][mes]=(matriz[cliente][mes]||0)+rec;
}

});

/* ===== GRAFICO COMPLETO ===== */
const meses=Object.keys(map);
const recArr=meses.map(m=>map[m].rec);
const cusArr=meses.map(m=>map[m].cus);

new Chart(graficoMensal,{
type:'bar',
data:{labels:meses,datasets:[
{data:cusArr,backgroundColor:'#ff7b7b'},
{data:recArr,backgroundColor:'#4CAF50'}
]},
options:{
plugins:{legend:{display:false}},
scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}
},
plugins:[{
id:'labels',
afterDatasetsDraw(c){
const ctx=c.ctx;
c.data.datasets.forEach((d,i)=>{
c.getDatasetMeta(i).data.forEach((bar,j)=>{
ctx.fillStyle='white';
ctx.fillText(f(d.data[j]),bar.x,bar.y-5);
});
});
}
}]
});

/* ===== DONUT ORIGINAL ===== */
const cores=l=>l.includes("70")?"#4CAF50":l.includes("50")?"#FFD966":"#ff7b7b";

new Chart(graficoDonut,{
type:'doughnut',
data:{
labels:Object.keys(pizza),
datasets:[{
data:Object.values(pizza).map(x=>x.qtd),
backgroundColor:Object.keys(pizza).map(cores)
}]
}
});

/* LEGENDA */
Object.keys(pizza).forEach(l=>{
legendaCustom.innerHTML+=`<div style="color:white">${l} | ${pizza[l].qtd} | ${f(pizza[l].valor)}</div>`;
});

/* TABELA COM TOTAL */
let html="<tr><th>Cliente</th>";
let mesesT=[...mesesSet];
mesesT.forEach(m=>html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

let totalGeral=0,totMes={};
mesesT.forEach(m=>totMes[m]=0);

Object.entries(matriz).forEach(([c,d])=>{
let total=0,row=`<tr><td>${c}</td>`;
mesesT.forEach(m=>{
let v=d[m]||0; total+=v; totMes[m]+=v;
row+=`<td>${v?f(v):""}</td>`;
});
totalGeral+=total;
row+=`<td>${f(total)}</td></tr>`;
html+=row;
});

html+=`<tr><td>Total</td>`;
mesesT.forEach(m=>html+=`<td>${f(totMes[m])}</td>`);
html+=`<td>${f(totalGeral)}</td></tr>`;

tabela50.innerHTML=html;

});

/* ================= PETROLEO ================= */

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQcvepFTyG2MaXqLKF_EnjfbqBOJMX5xZrwgPJUTcwXLB6A0Q0_VzEF83lgmjwsz4jZz2hZTd1aRLs4/pub?gid=1261021270&single=true&output=csv")
.then(r=>r.text()).then(data=>{

const linhas=parseCSV(data);

let map={},matriz={},mesesSet=new Set();

linhas.slice(1).forEach(l=>{
let c=l[1],v=br(l[19]),mes=mesAno(l[7]);

if(!map[c]) map[c]={qtd:0,valor:0};
map[c].qtd++; map[c].valor+=v;

if(mes){
mesesSet.add(mes);
if(!matriz[c]) matriz[c]={};
matriz[c][mes]=(matriz[c][mes]||0)+v;
}
});

/* DONUT */
new Chart(graficoDonutPetroleo,{
type:'doughnut',
data:{labels:Object.keys(map),datasets:[{data:Object.values(map).map(x=>x.qtd)}]}
});

/* LEGENDA */
Object.keys(map).forEach(l=>{
legendaPetroleo.innerHTML+=`<div style="color:white">${l} | ${map[l].qtd} | ${f(map[l].valor)}</div>`;
});

/* TABELA COM TOTAL */
let html="<tr><th>Cliente</th>";
let meses=[...mesesSet];
meses.forEach(m=>html+=`<th>${m}</th>`);
html+="<th>Total</th></tr>";

let totalGeral=0,totMes={};
meses.forEach(m=>totMes[m]=0);

Object.entries(matriz).forEach(([c,d])=>{
let total=0,row=`<tr><td>${c}</td>`;
meses.forEach(m=>{
let v=d[m]||0; total+=v; totMes[m]+=v;
row+=`<td>${v?f(v):""}</td>`;
});
totalGeral+=total;
row+=`<td>${f(total)}</td></tr>`;
html+=row;
});

html+=`<tr><td>Total</td>`;
meses.forEach(m=>html+=`<td>${f(totMes[m])}</td>`);
html+=`<td>${f(totalGeral)}</td></tr>`;

tabelaPetroleo.innerHTML=html;

});

</script>

</body>
</html>
