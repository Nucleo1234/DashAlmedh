<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Corporativo</title>

<style>

/* ===== RESET ===== */
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f7fb;
}

/* ===== HEADER ===== */
.header {
    background:#0f3b4c;
    color:white;
    padding:15px 25px;
    font-size:18px;
    font-weight:bold;
}

/* ===== MENU DE ABAS ===== */
.tabs {
    display:flex;
    background:#ffffff;
    border-bottom:2px solid #e0e0e0;
    padding-left:20px;
}

.tab-button {
    padding:14px 20px;
    cursor:pointer;
    border:none;
    background:none;
    font-size:14px;
    font-weight:600;
    color:#555;
    border-bottom:3px solid transparent;
    transition:0.3s;
}

.tab-button:hover {
    color:#0f3b4c;
}

.tab-button.active {
    color:#0f3b4c;
    border-bottom:3px solid #0f3b4c;
}

/* ===== CONTEÚDO ===== */
.tab-content {
    display:none;
    padding:20px;
}

.tab-content.active {
    display:block;
}

/* ===== CONTAINER INTERNO (onde você cola os dashboards) ===== */
.dashboard-container {
    background:#ffffff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.placeholder {
    text-align:center;
    color:#999;
    padding:40px;
    border:2px dashed #ddd;
    border-radius:8px;
    font-size:14px;
}

</style>
</head>

<body>

<!-- ===== TOPO ===== -->
<div class="header">
    Dashboard Financeiro e Operacional
</div>

<!-- ===== ABAS ===== -->
<div class="tabs">
    <button class="tab-button active" onclick="abrirAba('aba1', this)">
        Performance e Indicadores
    </button>

    <button class="tab-button" onclick="abrirAba('aba2', this)">
        Conciliação Bancária
    </button>

    <button class="tab-button" onclick="abrirAba('aba3', this)">
        Fluxo de Caixa Projetado
    </button>

    <button class="tab-button" onclick="abrirAba('aba4', this)">
        Fluxo de Caixa Projetado vs Realizado
    </button>
</div>

<!-- ===== CONTEÚDO DAS ABAS ===== -->

<!-- ABA 1 -->
<div id="aba1" class="tab-content active">
    <div class="dashboard-container">

        <!-- COLE SEU DASHBOARD DE PERFORMANCE AQUI -->
        <div class="placeholder">
            Cole aqui o código da aba <b>Performance e Indicadores</b>
        </div>

    </div>
</div>

<!-- ABA 2 -->
<div id="aba2" class="tab-content">
    <div class="dashboard-container">

        <!-- COLE AQUI -->
        <div class="placeholder">
            Cole aqui o código da aba <b>Conciliação Bancária</b>
        </div>

    </div>
</div>

<!-- ABA 3 -->
<div id="aba3" class="tab-content">
    <div class="dashboard-container">

        <!-- COLE AQUI -->
        <div class="placeholder">
            Cole aqui o código da aba <b>Fluxo de Caixa Projetado</b>
        </div>

    </div>
</div>

<!-- ABA 4 -->
<div id="aba4" class="tab-content">
    <div class="dashboard-container">

        <!-- COLE AQUI -->
        <div class="placeholder">
            Cole aqui o código da aba <b>Fluxo de Caixa Projetado vs Realizado</b>
        </div>

    </div>
</div>

<!-- ===== SCRIPT ===== -->
<script>
function abrirAba(id, botao){

    // esconder tudo
    document.querySelectorAll(".tab-content")
        .forEach(el => el.classList.remove("active"));

    document.querySelectorAll(".tab-button")
        .forEach(el => el.classList.remove("active"));

    // mostrar selecionada
    document.getElementById(id).classList.add("active");
    botao.classList.add("active");
}
</script>

</body>
</html>
